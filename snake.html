<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPER — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>:root{ --accent: var(--neon-lime); }</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">VIPER</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>HI <b id="hi">0</b></span>
    </div>
    <canvas id="c" width="400" height="400"></canvas>
    <button class="btn" id="start">PRESS START</button>
    <p class="hint">
      <span class="key">W A S D</span> or <span class="key">↑ ↓ ← →</span> to steer ·
      <span class="key">SPACE</span> pause · swipe on mobile
    </p>
  </div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const N = 20, CELL = cv.width / N;
const scoreEl = document.getElementById('score'), hiEl = document.getElementById('hi');
const startBtn = document.getElementById('start');

let snake, dir, nextDir, food, score, hi = +(localStorage.snakeHi || 0), loop, alive, paused;
hiEl.textContent = hi;

function reset() {
  snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
  dir = {x:1,y:0}; nextDir = dir;
  score = 0; scoreEl.textContent = 0;
  alive = true; paused = false;
  placeFood();
}
function placeFood() {
  do { food = {x: (Math.random()*N)|0, y:(Math.random()*N)|0}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}
function tick() {
  if (paused) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=N||head.y<0||head.y>=N || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    return gameOver();
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    SFX.score();
    score += 10; scoreEl.textContent = score;
    if (score>hi){ hi=score; hiEl.textContent=hi; localStorage.snakeHi=hi; }
    placeFood();
  } else snake.pop();
  draw();
}
function draw() {
  ctx.fillStyle = '#050109'; ctx.fillRect(0,0,cv.width,cv.height);
  // food
  ctx.fillStyle = '#ff2e88'; ctx.shadowColor='#ff2e88'; ctx.shadowBlur=12;
  ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);
  // snake
  ctx.shadowColor='#b6ff3d'; ctx.shadowBlur=10;
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? '#eaffc2' : '#b6ff3d';
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
  });
  ctx.shadowBlur=0;
}
function gameOver() {
  alive = false; clearInterval(loop);
  SFX.explode(); SFX.gameover();
  draw();
  ctx.fillStyle='rgba(5,1,9,.8)'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#ff2e88'; ctx.font='22px "Press Start 2P", monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', cv.width/2, cv.height/2-6);
  ctx.fillStyle='#b6ff3d'; ctx.font='12px "Press Start 2P", monospace';
  ctx.fillText('SCORE '+score, cv.width/2, cv.height/2+28);
  startBtn.textContent='PLAY AGAIN'; startBtn.style.display='inline-block';
}
function begin() {
  reset(); draw();
  startBtn.style.display='none';
  clearInterval(loop); loop = setInterval(tick, 110);
}
startBtn.onclick = () => { SFX.select(); begin(); };

function setDir(x,y){ if (dir.x===-x && dir.y===-y) return; if (nextDir.x!==x || nextDir.y!==y) SFX.move(); nextDir={x,y}; }
addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || 'wasd'.includes(k)) e.preventDefault();
  if (k==='arrowup'||k==='w') setDir(0,-1);
  else if (k==='arrowdown'||k==='s') setDir(0,1);
  else if (k==='arrowleft'||k==='a') setDir(-1,0);
  else if (k==='arrowright'||k==='d') setDir(1,0);
  else if (k===' ' && alive) paused=!paused;
});
// touch swipe
let tx,ty;
cv.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  const t=e.changedTouches[0], dx=t.clientX-tx, dy=t.clientY-ty;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
},{passive:true});

reset(); draw();
</script>
</body>
</html>
