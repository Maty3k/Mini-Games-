<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON STORM — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="three.min.js"></script>
<script src="lib/RGBELoader.js"></script>
<script src="lib/CopyShader.js"></script>
<script src="lib/LuminosityHighPassShader.js"></script>
<script src="lib/FXAAShader.js"></script>
<script src="lib/EffectComposer.js"></script>
<script src="lib/RenderPass.js"></script>
<script src="lib/ShaderPass.js"></script>

<script src="sfx.js"></script>
<style>:root{ --accent: var(--neon-amber); }
  .war-wrap{ position:relative; width:100%; max-width:700px; }
  .war-wrap canvas#c{ width:100%; display:block; border-radius:6px; cursor:none; }
  .minimap{ position:absolute; top:10px; right:10px; width:140px; height:140px;
    background:rgba(6,2,16,.5); border:2px solid var(--neon-amber); border-radius:6px; box-shadow:0 0 10px rgba(255,176,58,.5); }
  .reticle{ position:absolute; width:30px; height:30px; margin:-15px 0 0 -15px; pointer-events:none; display:none;
    border:2px solid rgba(255,90,60,.9); border-radius:50%; box-shadow:0 0 8px rgba(255,60,40,.8),inset 0 0 6px rgba(255,60,40,.6); }
  .reticle::before,.reticle::after{ content:''; position:absolute; background:rgba(255,90,60,.9); }
  .reticle::before{ left:13px; top:-7px; width:2px; height:9px; } .reticle::after{ left:13px; bottom:-7px; width:2px; height:9px; }
  .vitals{ position:absolute; left:12px; top:10px; font-family:'Press Start 2P',monospace; pointer-events:none; }
  .hpbar{ width:180px; height:14px; background:rgba(6,2,16,.7); border:2px solid #b6c0cc; border-radius:3px; box-shadow:0 0 8px rgba(0,0,0,.6); overflow:hidden; }
  .hpbar i{ display:block; height:100%; width:100%; background:linear-gradient(90deg,#18ff5a,#bfff00); transition:width .12s linear; }
  .hpbar i.warn{ background:linear-gradient(90deg,#ff9a2e,#ffd319); }
  .hpbar i.crit{ background:linear-gradient(90deg,#ff2e2e,#ff7b2e); }
  .vlabel{ font-size:9px; color:#cfe0ff; text-shadow:0 0 5px #000; margin-bottom:5px; letter-spacing:1px; }
  .tally{ font-size:11px; color:#fff; text-shadow:0 0 6px #000; margin-top:9px; line-height:1.7; }
  .tally b{ color:var(--neon-amber); }
  .reload{ position:absolute; left:50%; bottom:12px; transform:translateX(-50%); width:160px; pointer-events:none; text-align:center; }
  .reload .rb{ width:160px; height:9px; background:rgba(6,2,16,.7); border:1px solid var(--neon-amber); border-radius:4px; overflow:hidden; box-shadow:0 0 6px rgba(255,176,58,.5); }
  .reload .rb i{ display:block; height:100%; width:100%; background:#18ff5a; }
  .reload .rt{ font-family:'Press Start 2P',monospace; font-size:9px; margin-top:5px; letter-spacing:1px; text-shadow:0 0 6px #000; }
  .reload .rt.ready{ color:#18ff5a; } .reload .rt.busy{ color:#ff9a2e; }
  .fps{ position:absolute; right:12px; bottom:12px; font-family:'Press Start 2P',monospace; font-size:9px;
    color:#7af6ff; text-shadow:0 0 6px #000; pointer-events:none; letter-spacing:1px; }
  .banner{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'Press Start 2P',monospace; font-size:26px; color:#fff; text-shadow:0 0 16px #000,0 0 26px var(--neon-pink);
    pointer-events:none; opacity:0; transition:opacity .25s; }
  .settings{ display:flex; flex-wrap:wrap; gap:10px 18px; justify-content:center; align-items:center;
    margin-top:14px; font-family:'Press Start 2P',monospace; font-size:10px; color:#cdbfe0; }
  .settings .setrow{ display:flex; align-items:center; gap:7px; }
  .settings .lbl{ color:var(--neon-cyan); letter-spacing:1px; }
  .settings b{ color:var(--neon-amber); min-width:16px; text-align:center; display:inline-block; }
  .settings .sbtn,.settings .dbtn{ font-family:'Press Start 2P',monospace; cursor:pointer; color:#cdbfe0;
    background:rgba(20,8,42,.6); border:2px solid rgba(157,92,255,.5); border-radius:4px; }
  .settings .sbtn{ width:24px; height:24px; font-size:12px; line-height:1; padding:0; }
  .settings .dbtn{ font-size:8px; padding:6px 8px; }
  .settings .sbtn:hover,.settings .dbtn:hover{ border-color:var(--neon-cyan); color:#fff; }
  .settings .dbtn.on{ background:var(--neon-cyan); color:#04121a; border-color:var(--neon-cyan); }
  .d3-badge{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--neon-violet);
    border:1px solid var(--neon-violet); border-radius:3px; padding:3px 6px; letter-spacing:1px; }
  .status{ font-family:'Press Start 2P',monospace; font-size:12px; color:var(--neon-pink); text-align:center; min-height:14px; margin-top:12px; }
</style>
</head>
<body>
  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">IRON STORM</h1>
    <span class="d3-badge">▣ 3D</span>
  </nav>

  <div class="stage">
    <div class="war-wrap">
      <canvas id="c" width="700" height="438"></canvas>
      <canvas class="minimap" id="map" width="140" height="140"></canvas>
      <div class="reticle" id="reticle"></div>
      <div class="vitals">
        <div class="vlabel">ARMOUR</div>
        <div class="hpbar"><i id="hpfill"></i></div>
        <div class="tally">KILLS <b id="kills">0</b> · WAVE <b id="wave">1</b><br>HOSTILES <b id="alive">0</b> · BEST <b id="best">0</b></div>
      </div>
      <div class="reload"><div class="rb"><i id="rfill"></i></div><div class="rt ready" id="rtxt">● READY</div></div>
      <div class="fps" id="fps">FPS 0</div>
      <div class="banner" id="banner"></div>
    </div>
    <div class="settings" id="settings">
      <div class="setrow"><span class="lbl">HOSTILES</span><button class="sbtn" data-act="en-1">−</button><b id="setEn">4</b><button class="sbtn" data-act="en+1">+</button></div>
      <div class="setrow"><span class="lbl">LEVEL</span><button class="dbtn" data-diff="EASY">EASY</button><button class="dbtn on" data-diff="NORMAL">NORMAL</button><button class="dbtn" data-diff="HARD">HARD</button></div>
    </div>
    <p class="status" id="status">Loading battlefield…</p>
    <button class="btn" id="start" disabled>LOADING…</button>
    <p class="hint"><span class="key">W S</span> drive · <span class="key">A D</span> turn hull · <span class="key">mouse</span> aim turret · <span class="key">click / space</span> fire</p>
  </div>

<script>
const cv=document.getElementById('c'); const W=700,H=438;
const hpfill=document.getElementById('hpfill'), killsEl=document.getElementById('kills'), waveEl=document.getElementById('wave'),
      aliveEl=document.getElementById('alive'), bestEl=document.getElementById('best'), rfill=document.getElementById('rfill'),
      rtxt=document.getElementById('rtxt'), fpsEl=document.getElementById('fps'), bannerEl=document.getElementById('banner'),
      statusEl=document.getElementById('status'), startBtn=document.getElementById('start'), settingsEl=document.getElementById('settings'),
      reticleEl=document.getElementById('reticle'), setEnEl=document.getElementById('setEn');
const mapc=document.getElementById('map'), mapx=mapc.getContext('2d');
let best=+(localStorage.ironstormBest||0); bestEl.textContent=best;

// =================== realistic render stack (mirrors GRAND PRIX) ===================
const renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setSize(W,H,false);
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.95;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xcdbb96, 260, 900);          // dusty desert haze
const camera=new THREE.PerspectiveCamera(60,W/H,0.5,4000);

// hazy desert sky gradient
(function(){ const c=document.createElement('canvas'); c.width=4; c.height=512; const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#5b86c4'); grd.addColorStop(0.45,'#9fb4cf'); grd.addColorStop(0.78,'#d8cdb0'); grd.addColorStop(1,'#e8dcc0');
  g.fillStyle=grd; g.fillRect(0,0,4,512);
  const tx=new THREE.CanvasTexture(c); tx.encoding=THREE.sRGBEncoding; scene.background=tx; })();

// HDRI → PMREM environment (reflections / ambient), with graceful fallback
let ready=false;
const pmrem=new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
new THREE.RGBELoader().load('assets/venice_sunset_1k.hdr', tex=>{
  scene.environment=pmrem.fromEquirectangular(tex).texture; tex.dispose(); pmrem.dispose();
}, undefined, ()=>{});
// lights: low desert sun (shadows) + sky/ground fill so it reads well even pre-HDRI
const sun=new THREE.DirectionalLight(0xffe9c4, 2.3); sun.castShadow=true;
sun.position.set(120, 150, 70);
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=620;
const SH=260; sun.shadow.camera.left=-SH; sun.shadow.camera.right=SH; sun.shadow.camera.top=SH; sun.shadow.camera.bottom=-SH; sun.shadow.bias=-0.0006;
scene.add(sun, sun.target);
scene.add(new THREE.HemisphereLight(0xbcd2f0, 0x8a734c, 0.55));

// ground (sand), upgraded with the real sand photo when it loads
const ARENA=210;
const groundMat=new THREE.MeshStandardMaterial({color:0xb7a072, roughness:1, metalness:0});
const ground=new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), groundMat);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
const texL=new THREE.TextureLoader();
texL.load('assets/textures/sand_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(180,180); tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding;
  groundMat.map=tx; groundMat.color.set(0xffffff); groundMat.needsUpdate=true; });
let metalTex=null, concreteTex=null, gravelTex=null;
texL.load('assets/textures/metal_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding; metalTex=tx; });
texL.load('assets/textures/concrete_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(2,1); tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding; concreteTex=tx;
  walls.forEach(w=>{ w.material.map=tx; w.material.color.set(0xffffff); w.material.needsUpdate=true; }); });
texL.load('assets/textures/gravel_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(3,3); tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding; gravelTex=tx; });

// postprocessing — bloom for muzzle flashes & explosions, FXAA
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W,H), 0.55, 0.7, 0.82); composer.addPass(bloom);
const fxaa=new THREE.ShaderPass(THREE.FXAAShader); fxaa.material.uniforms['resolution'].value.set(1/W,1/H); composer.addPass(fxaa);

// =================== battlefield: perimeter + cover obstacles ===================
const walls=[];
const obstacles=[];   // {x,z,r,h,drum,hp,mesh,alive}
const matWall=new THREE.MeshStandardMaterial({color:0x8d8674, roughness:0.92, metalness:0.05, side:THREE.DoubleSide});
const matRock=new THREE.MeshStandardMaterial({color:0x7d756a, roughness:1, metalness:0});
const matSand=new THREE.MeshStandardMaterial({color:0xb09760, roughness:1, metalness:0});
const matDrum=new THREE.MeshStandardMaterial({color:0xb2402c, roughness:0.55, metalness:0.5});
const matBldg=new THREE.MeshStandardMaterial({color:0xb8ad92, roughness:0.95, metalness:0});
function buildArena(){
  // perimeter wall ring
  const ringGeo=new THREE.CylinderGeometry(ARENA+8, ARENA+8, 7, 64, 1, true);
  const ring=new THREE.Mesh(ringGeo, matWall.clone()); ring.position.y=3.5; ring.castShadow=true; ring.receiveShadow=true;
  scene.add(ring); walls.push(ring);
  // a wide low berm just outside for depth
  const berm=new THREE.Mesh(new THREE.TorusGeometry(ARENA+26, 16, 8, 60), matSand);
  berm.rotation.x=Math.PI/2; berm.position.y=-2; berm.receiveShadow=true; scene.add(berm);

  function addObstacle(o){ obstacles.push(o); scene.add(o.mesh); }
  // procedural but deterministic-ish layout (seeded by index math, no Math.random at top level need)
  const rnd=mulberry(20260604);
  // concrete barriers
  for(let i=0;i<7;i++){ const ang=rnd()*Math.PI*2, rad=40+rnd()*150;
    const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad;
    const w=6+rnd()*5, h=3.4, d=2.2;
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), matWall.clone());
    m.position.set(x,h/2,z); m.rotation.y=rnd()*Math.PI; m.castShadow=true; m.receiveShadow=true;
    walls.push(m); addObstacle({x,z,r:Math.max(w,d)/2+0.6,h,drum:false,hp:9999,alive:true,mesh:m}); }
  // rocks
  for(let i=0;i<10;i++){ const ang=rnd()*Math.PI*2, rad=30+rnd()*165;
    const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad, s=2.4+rnd()*3.4;
    const m=new THREE.Mesh(new THREE.IcosahedronGeometry(s,0), matRock);
    m.position.set(x,s*0.55,z); m.rotation.set(rnd()*3,rnd()*3,rnd()*3); m.scale.y=0.8; m.castShadow=true; m.receiveShadow=true;
    addObstacle({x,z,r:s*0.95,h:s*1.1,drum:false,hp:9999,alive:true,mesh:m}); }
  // sandbag mounds (low — shells arc over them)
  for(let i=0;i<6;i++){ const ang=rnd()*Math.PI*2, rad=45+rnd()*150;
    const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad;
    const m=new THREE.Mesh(new THREE.BoxGeometry(8,2.0,3.2), matSand.clone());
    m.position.set(x,1.0,z); m.rotation.y=rnd()*Math.PI; m.castShadow=true; m.receiveShadow=true;
    addObstacle({x,z,r:4,h:1.9,drum:false,hp:9999,alive:true,mesh:m}); }
  // two buildings for cover
  for(let i=0;i<2;i++){ const ang=(i?2.1:5.0), rad=120; const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad;
    const g=new THREE.Group(); const bw=16,bh=12,bd=14;
    const body=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd), matBldg.clone()); body.position.y=bh/2; body.castShadow=true; body.receiveShadow=true;
    const roof=new THREE.Mesh(new THREE.BoxGeometry(bw+1.5,1.2,bd+1.5), matWall.clone()); roof.position.y=bh+0.6; roof.castShadow=true;
    g.add(body,roof); g.position.set(x,0,z); g.rotation.y=rnd()*Math.PI; scene.add(g);
    addObstacle({x,z,r:Math.max(bw,bd)/2+0.8,h:bh,drum:false,hp:9999,alive:true,mesh:g}); }
  // explosive fuel drums (chain-react when shot)
  for(let i=0;i<7;i++){ const ang=rnd()*Math.PI*2, rad=35+rnd()*160;
    const x=Math.cos(ang)*rad, z=Math.sin(ang)*rad;
    const m=new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.2,2.6,16), matDrum.clone());
    m.position.set(x,1.3,z); m.castShadow=true; m.receiveShadow=true;
    addObstacle({x,z,r:1.6,h:2.6,drum:true,hp:1,alive:true,mesh:m}); }
}
// tiny seeded RNG so the layout is consistent each load
function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

// =================== tank factory ===================
function makeTank(bodyColor, isPlayer){
  const g=new THREE.Group();
  const body=new THREE.MeshStandardMaterial({color:bodyColor, roughness:0.78, metalness:0.32});
  const dark=new THREE.MeshStandardMaterial({color:0x23262b, roughness:0.95, metalness:0.15});
  const steel=new THREE.MeshStandardMaterial({color:0x6a6f78, roughness:0.5, metalness:0.7});
  if(metalTex){ body.map=metalTex; } // surface detail if available
  const all=[];
  function part(geo,mat,x,y,z,rx,ry,rz){ const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); if(rx)m.rotation.x=rx; if(ry)m.rotation.y=ry; if(rz)m.rotation.z=rz; m.castShadow=true; m.receiveShadow=true; all.push(m); return m; }
  // hull (lower + sloped glacis)
  const hull=part(new THREE.BoxGeometry(3.0,1.0,5.0),body,0,1.05,0);
  part(new THREE.BoxGeometry(3.0,0.9,1.6),body,0,1.55,1.9,-0.5);   // sloped front glacis
  part(new THREE.BoxGeometry(3.2,0.7,4.6),body,0,1.8,-0.2);        // upper hull
  // tracks
  const trackGeo=new THREE.BoxGeometry(0.85,1.0,5.4);
  part(trackGeo,dark, 1.55,0.55,0); part(trackGeo,dark,-1.55,0.55,0);
  // road wheels (visual detail)
  const wheelGeo=new THREE.CylinderGeometry(0.55,0.55,0.5,12);
  for(let s=-1;s<=1;s+=2) for(let i=0;i<5;i++){ part(wheelGeo,steel, s*1.55,0.55,-2.0+i, 0,0,Math.PI/2); }
  // fenders
  part(new THREE.BoxGeometry(0.95,0.12,5.2),dark, 1.55,1.12,0); part(new THREE.BoxGeometry(0.95,0.12,5.2),dark,-1.55,1.12,0);
  // turret pivot
  const turret=new THREE.Group(); turret.position.set(0,2.25,-0.1); g.add(turret);
  const tparts=[];
  function tpart(geo,mat,x,y,z,rx){ const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); if(rx)m.rotation.x=rx; m.castShadow=true; m.receiveShadow=true; turret.add(m); tparts.push(m); return m; }
  tpart(new THREE.CylinderGeometry(1.45,1.65,1.0,18),body,0,0.5,0);     // rounded turret
  tpart(new THREE.BoxGeometry(2.3,0.9,1.4),body,0,0.5,1.0);             // turret front cheek
  tpart(new THREE.CylinderGeometry(0.5,0.5,0.5,12),body,0.6,1.05,-0.3); // commander cupola
  // barrel on an elevation pivot
  const barrelPivot=new THREE.Group(); barrelPivot.position.set(0,0.5,1.1); turret.add(barrelPivot);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,3.4,12),steel); barrel.rotation.x=Math.PI/2; barrel.position.z=1.7; barrel.castShadow=true; barrelPivot.add(barrel);
  const mb=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.26,0.5,12),steel); mb.rotation.x=Math.PI/2; mb.position.z=3.25; barrelPivot.add(mb); // muzzle brake
  const muzzle=new THREE.Object3D(); muzzle.position.set(0,0,3.5); barrelPivot.add(muzzle);
  // antenna
  const ant=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,3.2,5),dark); ant.position.set(-1.1,1.6,-0.4); turret.add(ant);
  all.forEach(m=>g.add(m));
  g.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; } });
  scene.add(g);
  return {group:g, turret, barrelPivot, muzzle, body, dark, steel, allMats:[body,dark,steel,...tparts.map(p=>p.material)]};
}

// =================== particles (pooled meshes — individual fade/scale) ===================
const PMAX=320; const pPool=[]; const pSphere=new THREE.SphereGeometry(1,8,8);
for(let i=0;i<PMAX;i++){ const m=new THREE.Mesh(pSphere,new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false})); m.visible=false; scene.add(m); pPool.push({mesh:m,life:0,max:1,vx:0,vy:0,vz:0,grav:0,grow:0,base:1}); }
let pCur=0;
function spawnP(x,y,z,vx,vy,vz,col,size,life,grav,grow,add){
  let p=null;
  for(let k=0;k<PMAX;k++){ const idx=(pCur+k)%PMAX; if(pPool[idx].life<=0){ p=pPool[idx]; pCur=(idx+1)%PMAX; break; } }
  if(!p){ p=pPool[pCur]; pCur=(pCur+1)%PMAX; }
  p.mesh.position.set(x,y,z); p.vx=vx; p.vy=vy; p.vz=vz; p.grav=grav||0; p.grow=grow||0; p.base=size;
  p.life=life; p.max=life; p.mesh.scale.setScalar(size); p.mesh.visible=true;
  const mt=p.mesh.material; mt.color.setHex(col); mt.opacity=1; mt.blending=add?THREE.AdditiveBlending:THREE.NormalBlending; mt.needsUpdate=true;
}
function updateParts(dt){ for(const p of pPool){ if(p.life<=0) continue;
  p.life-=dt; if(p.life<=0){ p.mesh.visible=false; continue; }
  p.vy-=p.grav*dt; p.mesh.position.x+=p.vx*dt; p.mesh.position.y+=p.vy*dt; p.mesh.position.z+=p.vz*dt;
  if(p.mesh.position.y<0.1){ p.mesh.position.y=0.1; p.vy*=-0.2; p.vx*=0.6; p.vz*=0.6; }
  const f=p.life/p.max; p.mesh.material.opacity=f*f;
  p.mesh.scale.setScalar(p.base*(1+p.grow*(1-f)));
} }
// brief glow lights for blasts/muzzle
const LITES=[]; for(let i=0;i<4;i++){ const l=new THREE.PointLight(0xffaa44,0,60,2); l.visible=false; scene.add(l); LITES.push({l,life:0,max:1,peak:0}); }
function flashLight(x,y,z,col,intensity,life){ for(const o of LITES){ if(o.life<=0){ o.l.position.set(x,y,z); o.l.color.setHex(col); o.l.intensity=intensity; o.l.visible=true; o.life=life; o.max=life; o.peak=intensity; return; } } }
function updateLights(dt){ for(const o of LITES){ if(o.life<=0)continue; o.life-=dt; if(o.life<=0){o.l.visible=false;o.l.intensity=0;continue;} o.l.intensity=o.peak*(o.life/o.max); } }

function explosion(x,y,z,scale){
  scale=scale||1;
  flashLight(x,y+2,z,0xffb060, 6*scale, 0.22);
  // fireball
  for(let i=0;i<10;i++){ const a=Math.random()*6.28, e=Math.random()*1.4;
    spawnP(x,y+1,z, Math.cos(a)*Math.cos(e)*8*scale, Math.sin(e)*9*scale+4, Math.sin(a)*Math.cos(e)*8*scale,
      [0xffd23a,0xff7b2e,0xff3a1e][i%3], (1.1+Math.random()*1.4)*scale, 0.5+Math.random()*0.4, 10, 1.6, true); }
  // sparks
  for(let i=0;i<16;i++){ const a=Math.random()*6.28;
    spawnP(x,y+1,z, Math.cos(a)*(8+Math.random()*16)*scale, 6+Math.random()*14, Math.sin(a)*(8+Math.random()*16)*scale,
      0xffe08a, 0.28*scale, 0.4+Math.random()*0.5, 34, 0, true); }
  // smoke
  for(let i=0;i<10;i++){ const a=Math.random()*6.28;
    spawnP(x+Math.cos(a)*2,y+1.5,z+Math.sin(a)*2, Math.cos(a)*2.2, 3+Math.random()*3, Math.sin(a)*2.2,
      [0x4a4640,0x6a655c,0x39352f][i%3], (1.6+Math.random()*1.6)*scale, 1.2+Math.random()*0.9, -2, 2.2, false); }
}
function smokePuff(x,y,z,col,n){ for(let i=0;i<(n||1);i++){ const a=Math.random()*6.28;
  spawnP(x,y,z, Math.cos(a)*1.2,(0.6+Math.random()),Math.sin(a)*1.2, col, 0.6+Math.random()*0.5, 0.7+Math.random()*0.5,-1.5,1.5,false); } }

// =================== game state ===================
let player, enemies=[], shells=[], alive=false, raf, lastT=0, kills=0, wave=1, shake=0, flash=0, hitFlash=0;
const KEYS={};
let aimPoint=new THREE.Vector3(0,0,40);   // world ground point the turret tracks
let mouseNDC={x:0,y:-0.2}, mouseOver=false, mousePix={x:W/2,y:H*0.42};
let DIFF='NORMAL', MAXEN=4;
const DCFG={ EASY:{eReload:3.4,eSpread:0.13,eSpeed:0.7,eAcc:0.7}, NORMAL:{eReload:2.5,eSpread:0.075,eSpeed:0.9,eAcc:1}, HARD:{eReload:1.8,eSpread:0.035,eSpeed:1.05,eAcc:1.2} };

const SHELL_V=120, GRAV=34;        // shell muzzle speed & gravity (tuned for visible arcs at arena scale)
const PLAYER_RELOAD=1.15;
const enemyColors=[0x8a5a32,0x6b6f3a,0x7a4a40,0x55603c,0x9a7b46,0x4f5a64];

function fwdVec(h){ return {x:Math.sin(h), z:Math.cos(h)}; }   // hull/turret forward at heading h

function newTankState(isPlayer, color){
  const t=makeTank(color, isPlayer);
  return { ...t, isPlayer, x:0,z:0, h:0, tYaw:0, elev:0.04, spd:0, hp:isPlayer?100:55, maxhp:isPlayer?100:55,
           reload:0, alive:true, respawn:0, hitTint:0, dustT:0, aiState:'approach', aiTimer:0, strafe:1, vx:0,vz:0 };
}

function spawnEnemy(){
  const e=newTankState(false, enemyColors[(kills+enemies.length)%enemyColors.length]);
  // spawn at the perimeter, away from the player
  let ang, x, z, tries=0;
  do{ ang=Math.random()*Math.PI*2; const r=ARENA*0.82; x=Math.cos(ang)*r; z=Math.sin(ang)*r; tries++; }
  while(tries<12 && player && Math.hypot(x-player.x,z-player.z)<90);
  e.x=x; e.z=z; e.h=Math.atan2(player? (player.x-x):0, player?(player.z-z):0); e.tYaw=e.h;
  e.reload=DCFG[DIFF].eReload*(0.4+Math.random()*0.6);
  enemies.push(e);
}

function placeTank(t){ t.group.position.set(t.x,0,t.z); t.group.rotation.y=t.h;
  t.turret.rotation.y=t.tYaw-t.h; t.barrelPivot.rotation.x=-t.elev; }

// resolve a tank against obstacles, other tanks and the arena rim
function collide(t, others){
  // arena bound
  const d=Math.hypot(t.x,t.z); if(d>ARENA-4){ const k=(ARENA-4)/d; t.x*=k; t.z*=k; t.spd*=0.4; }
  for(const o of obstacles){ if(!o.alive) continue; const dx=t.x-o.x, dz=t.z-o.z; const dist=Math.hypot(dx,dz); const min=o.r+2.6;
    if(dist<min && dist>0.001){ const p=(min-dist)/dist; t.x+=dx*p; t.z+=dz*p; t.spd*=0.6; } }
  for(const u of others){ if(u===t||!u.alive) continue; const dx=t.x-u.x, dz=t.z-u.z; const dist=Math.hypot(dx,dz); const min=5.0;
    if(dist<min && dist>0.001){ const p=(min-dist)/dist*0.5; t.x+=dx*p; t.z+=dz*p; u.x-=dx*p; u.z-=dz*p; } }
}

// line-of-sight: is the segment a->b blocked by a tall obstacle?
function blocked(ax,az,bx,bz){
  for(const o of obstacles){ if(!o.alive||o.h<3) continue;
    const dx=bx-ax, dz=bz-az, L2=dx*dx+dz*dz; if(L2<1) continue;
    let tt=((o.x-ax)*dx+(o.z-az)*dz)/L2; tt=Math.max(0,Math.min(1,tt));
    const cx=ax+dx*tt, cz=az+dz*tt; if(Math.hypot(o.x-cx,o.z-cz)<o.r+1.2) return true; }
  return false;
}

// ballistic launch elevation to reach horizontal distance d on (roughly) level ground
function aimElevation(d){ const s=GRAV*d/(SHELL_V*SHELL_V); return s>=1?0.785:0.5*Math.asin(s); }

function fireFrom(t, targetYaw, targetDist, spread){
  const yaw=targetYaw + (spread? (Math.random()-0.5)*spread : 0);
  const elev=aimElevation(Math.min(targetDist, (SHELL_V*SHELL_V)/GRAV*0.95)) + (spread?(Math.random()-0.5)*spread*0.5:0);
  t.tYaw=yaw; t.elev=elev; placeTank(t);
  const mp=new THREE.Vector3(); t.muzzle.getWorldPosition(mp);
  const dir={ x:Math.sin(yaw)*Math.cos(elev), y:Math.sin(elev), z:Math.cos(yaw)*Math.cos(elev) };
  shells.push({ x:mp.x,y:mp.y,z:mp.z, vx:dir.x*SHELL_V, vy:dir.y*SHELL_V, vz:dir.z*SHELL_V, owner:t.isPlayer?'P':'E', life:6 });
  // recoil + muzzle flash + smoke + boom
  t.recoil=0.5;
  flashLight(mp.x,mp.y,mp.z,0xffd27a, 4, 0.1);
  for(let i=0;i<5;i++) spawnP(mp.x,mp.y,mp.z, dir.x*(6+Math.random()*8)+(Math.random()-0.5)*3, dir.y*6+Math.random()*2, dir.z*(6+Math.random()*8)+(Math.random()-0.5)*3, 0xffdf9a, 0.45,0.18,2,1.5,true);
  smokePuff(mp.x,mp.y,mp.z,0x6a655c,3);
  SFX.explode();
  if(t.isPlayer){ shake=Math.max(shake,0.5); t.reload=PLAYER_RELOAD; }
}

function damageTank(t, dmg, atx, atz){
  if(!t.alive) return; t.hp-=dmg; t.hitTint=0.18;
  if(t.hp<=0){ t.alive=false; t.group.visible=false;
    explosion(t.x,1.5,t.z, t.isPlayer?1.6:1.3);
    setTimeout(()=>explosion(t.x+(Math.random()-0.5)*3,2,t.z+(Math.random()-0.5)*3,0.8),140);
    if(t.isPlayer){ return gameOver(); }
    kills++; killsEl.textContent=kills; SFX.powerup();
    t.respawn=1.6;   // schedule a replacement
  } else { SFX.hit(); }
}

// explode an obstacle (fuel drum), chain to neighbours
function blowObstacle(o){ if(!o.alive||!o.drum) return; o.alive=false; o.mesh.visible=false;
  explosion(o.x,1.6,o.z,1.5); shake=Math.max(shake,0.4);
  // splash damage to tanks
  const TT=[player,...enemies]; for(const t of TT){ if(!t||!t.alive)continue; const d=Math.hypot(t.x-o.x,t.z-o.z); if(d<14) damageTank(t,(1-d/14)*45,o.x,o.z); }
  // chain
  for(const n of obstacles){ if(n.alive&&n.drum&&Math.hypot(n.x-o.x,n.z-o.z)<16){ const nn=n; setTimeout(()=>blowObstacle(nn),120+Math.random()*120); } }
}

function detonate(s, x,y,z){ explosion(x,Math.max(1,y),z, 0.9);
  const TT=[player,...enemies]; for(const t of TT){ if(!t||!t.alive)continue;
    const d=Math.hypot(t.x-x,t.z-z);
    if(d<14){ const direct=d<4; const dmg=(direct?40:0)+(1-Math.min(1,d/14))*22;
      // friendly fire off: player shells don't hurt player, enemy shells don't hurt enemies
      if(s.owner==='P' && t.isPlayer) continue;
      if(s.owner==='E' && !t.isPlayer) continue;
      damageTank(t, dmg, x, z); } }
  for(const o of obstacles){ if(o.alive&&o.drum&&Math.hypot(o.x-x,o.z-z)<6) blowObstacle(o); }
}

function updateShells(dt){
  for(let i=shells.length-1;i>=0;i--){ const s=shells[i];
    s.vy-=GRAV*dt; const nx=s.x+s.vx*dt, ny=s.y+s.vy*dt, nz=s.z+s.vz*dt;
    // tracer smoke
    spawnP(s.x,s.y,s.z,0,0,0, s.owner==='P'?0xfff0c0:0xffb0a0, 0.22,0.18,0,0.5,true);
    let hit=false, hx=nx,hy=ny,hz=nz;
    if(ny<=0.2){ hit=true; hy=0.2; }
    // tanks
    const TT=[player,...enemies]; for(const t of TT){ if(!t||!t.alive)continue; if(s.owner==='P'&&t.isPlayer)continue; if(s.owner==='E'&&!t.isPlayer)continue;
      if(Math.hypot(nx-t.x,nz-t.z)<3.0 && ny<4.5){ hit=true; hx=nx;hy=ny;hz=nz; break; } }
    // obstacles
    if(!hit) for(const o of obstacles){ if(!o.alive)continue; if(Math.hypot(nx-o.x,nz-o.z)<o.r && ny<o.h){ hit=true; hx=nx;hy=ny;hz=nz; if(o.drum) blowObstacle(o); break; } }
    if(hit){ detonate(s,hx,hy,hz); shells.splice(i,1); continue; }
    s.x=nx; s.y=ny; s.z=nz; s.life-=dt; if(s.life<=0 || Math.hypot(s.x,s.z)>ARENA+40) shells.splice(i,1);
  }
}

// =================== player & AI control ===================
const ray=new THREE.Raycaster(), _o=new THREE.Vector3(), _d=new THREE.Vector3();
function updateAim(){
  ray.setFromCamera({x:mouseNDC.x,y:mouseNDC.y}, camera);
  _o.copy(ray.ray.origin); _d.copy(ray.ray.direction);
  if(Math.abs(_d.y)>1e-5){ const t=-_o.y/_d.y; if(t>0){ aimPoint.set(_o.x+_d.x*t,0,_o.z+_d.z*t); } }
  const dd=Math.hypot(aimPoint.x-player.x, aimPoint.z-player.z);
  if(dd>ARENA){ const k=ARENA/dd; aimPoint.x=player.x+(aimPoint.x-player.x)*k; aimPoint.z=player.z+(aimPoint.z-player.z)*k; }
}
function updatePlayer(dt){
  // drive
  const accel=(KEYS['w']?1:0)-(KEYS['s']?1:0);
  player.spd += accel*26*dt; player.spd*=Math.pow(0.12,dt); // engine + drag
  player.spd=Math.max(-13,Math.min(27,player.spd));
  const turn=(KEYS['a']?1:0)-(KEYS['d']?1:0);
  player.h += turn*1.7*dt*(0.5+0.5*Math.min(1,Math.abs(player.spd)/8+0.3));
  const f=fwdVec(player.h); player.x+=f.x*player.spd*dt; player.z+=f.z*player.spd*dt;
  collide(player, enemies);
  // turret tracks the aim point
  updateAim();
  const want=Math.atan2(aimPoint.x-player.x, aimPoint.z-player.z);
  let dy=want-player.tYaw; while(dy>Math.PI)dy-=6.283; while(dy<-Math.PI)dy+=6.283;
  player.tYaw += Math.max(-3.0*dt,Math.min(3.0*dt,dy));     // limited traverse speed
  player.elev = aimElevation(Math.min(Math.hypot(aimPoint.x-player.x,aimPoint.z-player.z), (SHELL_V*SHELL_V)/GRAV*0.95));
  // reload + recoil recovery
  if(player.reload>0) player.reload-=dt;
  if(player.recoil>0) player.recoil-=dt*3;
  // tread dust
  player.dustT-=dt; if(Math.abs(player.spd)>4 && player.dustT<=0){ player.dustT=0.06; const r=fwdVec(player.h);
    smokePuff(player.x-r.x*2.6+(Math.random()-0.5)*2, 0.3, player.z-r.z*2.6+(Math.random()-0.5)*2, 0xbfa877,1); }
  // barrel visual recoil
  player.barrelPivot.position.z = 1.1 - (player.recoil>0?player.recoil*0.8:0);
  placeTank(player);
}
function fireWeapon(){ if(!alive||!player.alive||player.reload>0) return;
  const dd=Math.hypot(aimPoint.x-player.x,aimPoint.z-player.z); fireFrom(player, player.tYaw, dd, 0); }

function updateEnemy(e,dt){ if(!e.alive){ if(e.respawn>0){ e.respawn-=dt; if(e.respawn<=0){ /* recycle */ resetEnemy(e); } } return; }
  const cfg=DCFG[DIFF];
  const dx=player.x-e.x, dz=player.z-e.z, dist=Math.hypot(dx,dz);
  const toP=Math.atan2(dx,dz);
  // desired heading: keep an engagement range, strafe a little, steer around obstacles
  let desired=toP;
  if(dist>120) desired=toP;                          // close in
  else if(dist<55) desired=toP+Math.PI;              // back off
  else desired=toP + e.strafe*0.6;                   // orbit/strafe at range
  // obstacle avoidance: if something tall is just ahead, veer
  const fa=fwdVec(e.h); const ax=e.x+fa.x*12, az=e.z+fa.z*12;
  for(const o of obstacles){ if(o.alive&&o.h>2&&Math.hypot(o.x-ax,o.z-az)<o.r+5){ desired=Math.atan2(e.x-o.x,e.z-o.z); break; } }
  let dh=desired-e.h; while(dh>Math.PI)dh-=6.283; while(dh<-Math.PI)dh+=6.283;
  e.h += Math.max(-1.4*dt,Math.min(1.4*dt,dh));
  const align=Math.cos(dh);
  e.spd += (align>0.3?1:-0.3)*22*cfg.eSpeed*dt; e.spd*=Math.pow(0.2,dt); e.spd=Math.max(-8,Math.min(20*cfg.eSpeed,e.spd));
  const f=fwdVec(e.h); e.x+=f.x*e.spd*dt; e.z+=f.z*e.spd*dt;
  collide(e, enemies.filter(x=>x!==e).concat(player));
  // turret aims at player with lead
  const lead=dist/SHELL_V; const px=player.x+ (player.spd*Math.sin(player.h))*lead, pz=player.z+(player.spd*Math.cos(player.h))*lead;
  const want=Math.atan2(px-e.x, pz-e.z);
  let dy=want-e.tYaw; while(dy>Math.PI)dy-=6.283; while(dy<-Math.PI)dy+=6.283;
  e.tYaw += Math.max(-1.8*dt,Math.min(1.8*dt,dy));
  e.elev = aimElevation(Math.min(dist,(SHELL_V*SHELL_V)/GRAV*0.95));
  if(e.recoil>0){ e.recoil-=dt*3; e.barrelPivot.position.z=1.1-e.recoil*0.8; }
  // dust
  e.dustT-=dt; if(Math.abs(e.spd)>4&&e.dustT<=0){ e.dustT=0.09; const r=fwdVec(e.h); smokePuff(e.x-r.x*2.6,0.3,e.z-r.z*2.6,0xbfa877,1); }
  // fire decision
  e.reload-=dt;
  if(e.reload<=0 && dist<185 && Math.abs(dy)<0.12 && !blocked(e.x,e.z,player.x,player.z)){
    fireFrom(e, e.tYaw, dist, cfg.eSpread); e.reload=cfg.eReload*(0.8+Math.random()*0.5); e.strafe=(Math.random()<0.5?1:-1);
  }
  if(Math.random()<0.004) e.strafe*=-1;
  placeTank(e);
}
function resetEnemy(e){ // turn a dead slot back into a fresh hostile at the perimeter
  let ang,x,z,tries=0; do{ ang=Math.random()*6.283; const r=ARENA*0.82; x=Math.cos(ang)*r; z=Math.sin(ang)*r; tries++; }while(tries<12&&Math.hypot(x-player.x,z-player.z)<90);
  e.x=x;e.z=z;e.h=Math.atan2(player.x-x,player.z-z);e.tYaw=e.h;e.spd=0;e.hp=e.maxhp=55+wave*4; e.alive=true; e.group.visible=true;
  e.reload=DCFG[DIFF].eReload; e.body.color.setHex(enemyColors[(kills+wave)%enemyColors.length]); e.body.needsUpdate=true;
  wave=1+Math.floor(kills/Math.max(1,MAXEN)); waveEl.textContent=wave;
}

// =================== camera, hud, minimap ===================
const camPos=new THREE.Vector3(), camAt=new THREE.Vector3();
function followCam(dt){
  const f=fwdVec(player.h);
  // chase behind the hull, raised and looking down at the battlefield
  const want=new THREE.Vector3(player.x-f.x*19, 14, player.z-f.z*19);
  if(shake>0){ shake-=dt*2.4; const m=Math.max(0,shake)*1.6; want.x+=(Math.random()-0.5)*m; want.y+=(Math.random()-0.5)*m; want.z+=(Math.random()-0.5)*m; }
  camera.position.lerp(want, 1-Math.pow(0.0001,dt));
  // look just ahead of the tank, nudged toward where the turret is aiming (direction only)
  const ax=aimPoint.x-player.x, az=aimPoint.z-player.z, al=Math.hypot(ax,az)||1;
  camAt.set(player.x+f.x*10+(ax/al)*6, 2.5, player.z+f.z*10+(az/al)*6);
  camera.lookAt(camAt);
  // keep the sun shadow box near the action
  sun.position.set(player.x+120, 150, player.z+70); sun.target.position.set(player.x,0,player.z); sun.target.updateMatrixWorld();
}
function setHP(){ const r=Math.max(0,player.hp)/player.maxhp*100; hpfill.style.width=r+'%';
  hpfill.className=r<25?'crit':r<55?'warn':''; }
function drawMap(){ mapx.clearRect(0,0,140,140); const sc=140/(ARENA*2.2); const cx=70,cy=70;
  mapx.fillStyle='rgba(120,108,84,.25)'; mapx.beginPath(); mapx.arc(cx,cy,ARENA*sc,0,6.283); mapx.fill();
  mapx.strokeStyle='rgba(255,176,58,.6)'; mapx.lineWidth=1.5; mapx.stroke();
  for(const o of obstacles){ if(!o.alive)continue; mapx.fillStyle=o.drum?'#ff5a3c':'#9a9384'; mapx.fillRect(cx+o.x*sc-1.5,cy+o.z*sc-1.5,3,3); }
  for(const e of enemies){ if(!e.alive)continue; mapx.fillStyle='#ff3a2e'; mapx.beginPath(); mapx.arc(cx+e.x*sc,cy+e.z*sc,2.6,0,6.283); mapx.fill(); }
  if(player&&player.alive){ const f=fwdVec(player.h); mapx.fillStyle='#18ff5a'; mapx.save(); mapx.translate(cx+player.x*sc,cy+player.z*sc); mapx.rotate(Math.atan2(f.x,f.z));
    mapx.beginPath(); mapx.moveTo(0,-5); mapx.lineTo(3.5,4); mapx.lineTo(-3.5,4); mapx.closePath(); mapx.fill(); mapx.restore(); }
}
function countAlive(){ return enemies.filter(e=>e.alive).length; }

// =================== main loop ===================
let fpsT=0, fpsN=0;
function frame(now){
  if(!alive) return;
  const dt=Math.min(0.05,(now-lastT)/1000||0.016); lastT=now;
  updatePlayer(dt);
  for(const e of enemies) updateEnemy(e,dt);
  updateShells(dt);
  updateParts(dt); updateLights(dt);
  // hit tints
  for(const t of [player,...enemies]){ if(!t)continue; if(t.hitTint>0){ t.hitTint-=dt;
      t.body.emissive.setHex(t.hitTint>0?0x661008:0x000000); } }
  // keep at least MAXEN hostiles engaged
  if(countAlive()+enemies.filter(e=>!e.alive&&e.respawn>0).length < MAXEN) spawnEnemy();
  aliveEl.textContent=countAlive();
  // reload HUD
  const rr=player.reload>0?1-player.reload/PLAYER_RELOAD:1; rfill.style.width=(rr*100)+'%';
  rfill.style.background=player.reload>0?'#ff9a2e':'#18ff5a';
  rtxt.textContent=player.reload>0?'⟳ RELOADING':'● READY'; rtxt.className='rt '+(player.reload>0?'busy':'ready');
  setHP();
  // reticle follows the mouse, hidden when off-canvas
  reticleEl.style.display=(mouseOver&&alive)?'block':'none';
  reticleEl.style.left=mousePix.x+'px'; reticleEl.style.top=mousePix.y+'px';
  // damage vignette
  if(hitFlash>0){ hitFlash-=dt*2; cv.style.boxShadow='inset 0 0 80px rgba(255,40,30,'+Math.max(0,hitFlash)+')'; }
  else if(cv.style.boxShadow) cv.style.boxShadow='';
  followCam(dt);
  composer.render(); drawMap();
  fpsN++; fpsT+=dt; if(fpsT>=0.5){ fpsEl.textContent='FPS '+Math.round(fpsN/fpsT); fpsN=0; fpsT=0; }
  raf=requestAnimationFrame(frame);
}

// =================== lifecycle ===================
function clearEnemies(){ for(const e of enemies){ scene.remove(e.group); } enemies=[]; }
function reset(){
  clearEnemies(); shells=[]; kills=0; wave=1; shake=0; hitFlash=0;
  killsEl.textContent=0; waveEl.textContent=1;
  for(const p of pPool){ p.life=0; p.mesh.visible=false; }
  for(const o of obstacles){ if(o.drum && !o.alive){ o.alive=true; o.mesh.visible=true; } }
  if(player){ scene.remove(player.group); }
  player=newTankState(true, 0x3f5233); player.x=0; player.z=-ARENA*0.45; player.h=0; player.tYaw=0;
  placeTank(player);
  for(let i=0;i<MAXEN;i++) spawnEnemy();
  aliveEl.textContent=countAlive();
  camera.position.set(player.x, 12, player.z-20); camera.lookAt(player.x,2,player.z+10);
}
function begin(){ SFX.select(); settingsEl.style.display='none'; startBtn.style.display='none';
  reset(); alive=true; bannerEl.style.opacity=0;
  statusEl.textContent='ENGAGE'; statusEl.style.color='var(--neon-lime)';
  try{ SFX.startHum&&SFX.startHum(); }catch(e){}
  cancelAnimationFrame(raf); lastT=performance.now(); raf=requestAnimationFrame(frame);
}
function gameOver(){ alive=false; cancelAnimationFrame(raf); player.alive=false;
  try{ SFX.stopHum&&SFX.stopHum(); }catch(e){}
  setTimeout(()=>SFX.gameover(),200);
  const sc=kills;
  bannerEl.textContent='TANK DESTROYED\n'+sc+' KILLS'; bannerEl.style.whiteSpace='pre'; bannerEl.style.opacity=1;
  if(sc>best){ best=sc; bestEl.textContent=best; localStorage.ironstormBest=best; statusEl.textContent='★ RECORD '+sc+' KILLS ★'; }
  else statusEl.textContent='DESTROYED · '+sc+' KILLS';
  statusEl.style.color='var(--neon-pink)';
  cv.style.boxShadow='';
  setTimeout(()=>{ composer.render(); },60);
  startBtn.textContent='REDEPLOY'; startBtn.style.display='inline-block'; settingsEl.style.display='';
}
startBtn.onclick=begin;

// override damageTank's player-death hook to flash the screen
const _dmg=damageTank;
damageTank=function(t,dmg,ax,az){ if(t&&t.isPlayer&&t.alive){ hitFlash=1; shake=Math.max(shake,0.5); } _dmg(t,dmg,ax,az); };

// =================== input ===================
addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
  if(['w','a','s','d',' '].includes(k)) e.preventDefault();
  if(k===' '){ if(!KEYS[' ']) fireWeapon(); KEYS[' ']=true; return; }
  KEYS[k]=true; });
addEventListener('keyup',e=>{ KEYS[e.key.toLowerCase()]=false; });
function setMouse(e){ const r=cv.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
  mouseNDC.x=x*2-1; mouseNDC.y=-(y*2-1);
  mousePix.x=x*cv.clientWidth; mousePix.y=y*cv.clientHeight;
  mouseOver = x>=0&&x<=1&&y>=0&&y<=1; }
cv.addEventListener('mousemove',setMouse);
cv.addEventListener('mouseenter',()=>mouseOver=true);
cv.addEventListener('mouseleave',()=>mouseOver=false);
cv.addEventListener('mousedown',e=>{ if(e.button===0){ e.preventDefault(); fireWeapon(); } });
// touch: tap to aim+fire toward the point
cv.addEventListener('touchstart',e=>{ if(e.touches[0]){ setMouse(e.touches[0]); mouseOver=true; updateAim(); fireWeapon(); } },{passive:true});

// settings
settingsEl.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  if(b.dataset.act==='en+1'&&MAXEN<6){MAXEN++;} else if(b.dataset.act==='en-1'&&MAXEN>2){MAXEN--;}
  if(b.dataset.diff){ DIFF=b.dataset.diff; settingsEl.querySelectorAll('.dbtn').forEach(x=>x.classList.toggle('on',x===b)); }
  setEnEl.textContent=MAXEN; try{SFX.tick();}catch(e){} });

// =================== boot ===================
buildArena();
function bootReady(){ ready=true; statusEl.textContent='Destroy the enemy armour. Survive.'; statusEl.style.color='var(--neon-pink)';
  startBtn.disabled=false; startBtn.textContent='PRESS START';
  // idle preview render
  player=newTankState(true, 0x3f5233); player.x=0; player.z=-ARENA*0.45; placeTank(player);
  camera.position.set(0,16,-ARENA*0.45-26); camera.lookAt(0,2,-ARENA*0.45+12);
  composer.render(); drawMap();
}
setTimeout(bootReady, 350);   // let the first textures/HDRI start streaming in
</script>
</body>
