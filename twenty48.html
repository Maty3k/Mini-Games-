<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUSION — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>
  :root{ --accent: var(--neon-amber); }
  .grid2048{
    position:relative; width:100%; max-width:380px; aspect-ratio:1;
    background:#0a0418; border:3px solid var(--neon-amber); border-radius:8px; padding:10px;
    box-shadow:0 0 16px var(--neon-amber), inset 0 0 30px rgba(0,0,0,.8);
    display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); gap:10px;
  }
  .bg-cell{ background:rgba(177,75,255,.08); border-radius:5px; }
  .tile{
    position:absolute; display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace; border-radius:5px;
    transition:transform .12s ease; font-size:22px; color:#0a0418;
  }
  .tile.small{ font-size:15px; }
  .pop{ animation:pop .16s ease; } @keyframes pop{ 0%{transform:scale(.1)} 100%{transform:scale(1)} }
  .status{ font-family:'Press Start 2P',monospace; font-size:13px; color:var(--neon-pink);
    text-align:center; min-height:16px; margin-top:16px; }
</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">FUSION</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>BEST <b id="best">0</b></span>
    </div>
    <div class="grid2048" id="grid"></div>
    <p class="status" id="status"></p>
    <button class="btn" id="reset">NEW GAME</button>
    <p class="hint"><span class="key">↑ ↓ ← →</span> / <span class="key">W A S D</span> · swipe on mobile · reach 2048</p>
  </div>

<script>
const N=4, gridEl=document.getElementById('grid');
const scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), statusEl=document.getElementById('status');
const COLORS={2:'#bde0ff',4:'#9ad7ff',8:'#25f4ee',16:'#acff3d',32:'#ffd319',64:'#ff8a2a',
  128:'#ff36d0',256:'#ff2e97',512:'#b14bff',1024:'#9d5cff',2048:'#fff'};
let cells, score, best=+(localStorage.g2048Best||0), tilesLayer, over;
bestEl.textContent=best;

function build(){
  gridEl.innerHTML='';
  for(let i=0;i<16;i++){ const c=document.createElement('div'); c.className='bg-cell'; gridEl.appendChild(c); }
  tilesLayer=document.createElement('div'); tilesLayer.style.position='absolute'; tilesLayer.style.inset='10px';
  gridEl.appendChild(tilesLayer);
}
function newGame(){
  cells=Array.from({length:N},()=>Array(N).fill(0));
  score=0; scoreEl.textContent=0; over=false; statusEl.textContent='';
  build(); addTile(); addTile(); render(true);
}
function addTile(){
  const empty=[]; for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(!cells[r][c]) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[(Math.random()*empty.length)|0];
  cells[r][c]=Math.random()<0.9?2:4;
}
function render(fresh){
  tilesLayer.innerHTML='';
  const gap=10, size=`calc((100% - ${gap*3}px)/4)`;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){ const v=cells[r][c]; if(!v) continue;
    const t=document.createElement('div'); t.className='tile'+(v>=128?' small':'')+(fresh?'':' pop');
    t.style.width=size; t.style.height=size;
    t.style.transform=`translate(calc(${c} * (100% + ${gap}px)), calc(${r} * (100% + ${gap}px)))`;
    t.style.background=COLORS[v]||'#fff'; t.style.color=v<=4?'#0a0418':'#06121f';
    t.style.boxShadow=`0 0 10px ${COLORS[v]||'#fff'}`;
    t.textContent=v; tilesLayer.appendChild(t);
  }
}
function slide(row){               // slide+merge toward index 0
  let a=row.filter(v=>v); let gained=0;
  for(let i=0;i<a.length-1;i++) if(a[i]===a[i+1]){ a[i]*=2; gained+=a[i]; a.splice(i+1,1); }
  while(a.length<N) a.push(0);
  return {row:a, gained};
}
function move(dir){
  if(over) return;
  const prev=JSON.stringify(cells); let gained=0;
  const get=(r,c)=>cells[r][c], set=(r,c,v)=>cells[r][c]=v;
  for(let i=0;i<N;i++){
    let line=[];
    for(let j=0;j<N;j++){
      if(dir==='left')  line.push(get(i,j));
      if(dir==='right') line.push(get(i,N-1-j));
      if(dir==='up')    line.push(get(j,i));
      if(dir==='down')  line.push(get(N-1-j,i));
    }
    const res=slide(line); gained+=res.gained;
    for(let j=0;j<N;j++){
      const v=res.row[j];
      if(dir==='left')  set(i,j,v);
      if(dir==='right') set(i,N-1-j,v);
      if(dir==='up')    set(j,i,v);
      if(dir==='down')  set(N-1-j,i,v);
    }
  }
  if(JSON.stringify(cells)===prev) return;          // nothing moved
  SFX.move();
  if(gained>0) SFX.score();
  score+=gained; scoreEl.textContent=score;
  if(score>best){ best=score; bestEl.textContent=best; localStorage.g2048Best=best; }
  addTile(); render(false);
  if(cells.flat().includes(2048)) { statusEl.textContent='★ 2048! YOU WIN ★'; statusEl.style.color='var(--neon-lime)'; SFX.win(); }
  if(!canMove()){ over=true; statusEl.textContent='GAME OVER'; statusEl.style.color='var(--neon-pink)'; SFX.gameover(); }
}
function canMove(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(!cells[r][c]) return true;
    if(c<N-1 && cells[r][c]===cells[r][c+1]) return true;
    if(r<N-1 && cells[r][c]===cells[r+1][c]) return true;
  }
  return false;
}
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase(); let d=null;
  if(k==='arrowleft'||k==='a')d='left'; else if(k==='arrowright'||k==='d')d='right';
  else if(k==='arrowup'||k==='w')d='up'; else if(k==='arrowdown'||k==='s')d='down';
  if(d){ e.preventDefault(); move(d); }
});
let tx,ty;
gridEl.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
gridEl.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left'); else move(dy>0?'down':'up');
},{passive:true});
document.getElementById('reset').onclick=()=>{ SFX.select(); newGame(); };
newGame();
</script>
</body>
</html>
