<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKOUT — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>:root{ --accent: var(--neon-lime); }
  .status{
    font-family:'Press Start 2P',monospace; font-size:13px; text-align:center;
    min-height:20px; margin-top:16px; letter-spacing:1px; color:var(--accent);
    text-shadow:0 0 8px var(--accent);
  }
  .board{
    display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
    width:100%; max-width:380px; padding:16px; margin-top:4px;
    background:#0a0418; border:3px solid var(--accent); border-radius:8px;
    box-shadow:0 0 16px var(--accent), inset 0 0 40px rgba(0,0,0,.85);
    touch-action:manipulation; user-select:none;
  }
  .light{
    aspect-ratio:1/1; border:2px solid #2a1252; border-radius:8px;
    background:#150a28; cursor:pointer; padding:0;
    transition:background .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .light:hover{ border-color:var(--accent); }
  .light.on{
    background:var(--accent); border-color:var(--accent);
    box-shadow:0 0 14px var(--accent), 0 0 28px rgba(172,255,61,.55), inset 0 0 10px rgba(255,255,255,.5);
  }
</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">BLACKOUT</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>MOVES <b id="moves">0</b></span>
      <span>BEST <b id="best">--</b></span>
    </div>
    <div class="board" id="board"></div>
    <p class="status" id="status">TURN THEM ALL OFF</p>
    <button class="btn" id="reset">NEW GAME</button>
    <p class="hint">
      Click a cell to toggle it and its 4 neighbors.
      Switch <span class="key">every</span> light off to win.
    </p>
  </div>

<script>
(function(){
  const N=5;
  const boardEl=document.getElementById('board');
  const movesEl=document.getElementById('moves');
  const bestEl=document.getElementById('best');
  const statusEl=document.getElementById('status');
  const resetBtn=document.getElementById('reset');
  const KEY='neon_lightsout_best';

  let grid=[];   // booleans on/off
  let cellsEl=[];
  let moves=0;
  let won=false;

  function loadBest(){
    const v=localStorage.getItem(KEY);
    bestEl.textContent=v?v:'--';
  }
  function saveBest(m){
    const v=localStorage.getItem(KEY);
    if(v===null||m<parseInt(v,10)){
      localStorage.setItem(KEY,String(m));
      bestEl.textContent=m;
    }
  }

  function idx(r,c){ return r*N+c; }
  function inB(r,c){ return r>=0&&r<N&&c>=0&&c<N; }

  function build(){
    boardEl.innerHTML=''; cellsEl=[];
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      const el=document.createElement('button');
      el.className='light'; el.dataset.r=r; el.dataset.c=c;
      boardEl.appendChild(el); cellsEl.push(el);
    }
  }

  function render(){
    for(let i=0;i<N*N;i++) cellsEl[i].classList.toggle('on',grid[i]);
  }

  function applyToggle(r,c){
    const press=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
    press.forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(inB(nr,nc)) grid[idx(nr,nc)]=!grid[idx(nr,nc)];
    });
  }

  function isSolved(){ return grid.every(v=>!v); }

  function play(r,c){
    if(won)return;
    SFX.move();
    applyToggle(r,c);
    moves++; movesEl.textContent=moves;
    render();
    if(isSolved()){
      won=true;
      SFX.win();
      statusEl.textContent='★ ALL OUT ★';
      saveBest(moves);
    }
  }

  function scramble(){
    grid=new Array(N*N).fill(false);
    // apply ~6 random valid clicks from all-off => guaranteed solvable
    let applied=0, guard=0;
    const target=6;
    const used=new Set();
    while(applied<target && guard<200){
      guard++;
      const r=Math.floor(Math.random()*N), c=Math.floor(Math.random()*N);
      const k=idx(r,c);
      if(used.has(k))continue; // distinct presses (pressing twice cancels)
      used.add(k);
      applyToggle(r,c);
      applied++;
    }
    if(isSolved()){ // extremely unlikely; force one press
      applyToggle(2,2);
    }
  }

  boardEl.addEventListener('click',e=>{
    const t=e.target.closest('.light'); if(!t)return;
    play(+t.dataset.r,+t.dataset.c);
  });

  function newGame(){
    won=false; moves=0; movesEl.textContent=0;
    statusEl.textContent='TURN THEM ALL OFF';
    scramble(); render();
  }

  resetBtn.addEventListener('click',()=>{ SFX.select(); newGame(); });
  loadBest();
  build();
  newGame();
})();
</script>
</body>
</html>
