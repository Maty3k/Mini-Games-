<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUSHBOT — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>:root{ --accent: #ff8a2a; }
  .status{ font-family:'Press Start 2P',monospace; font-size:13px; text-align:center;
           min-height:1.4em; margin-top:14px; color:var(--ink); letter-spacing:1px; }
  .pad{ display:grid; grid-template-columns:repeat(3,58px); grid-template-rows:repeat(3,58px);
        gap:8px; margin-top:18px; }
  .pad button{
    font-family:'Press Start 2P',monospace; font-size:16px; cursor:pointer;
    color:var(--accent); background:transparent; border:2px solid var(--accent); border-radius:6px;
    transition:transform .07s ease;
  }
  .pad button:active{ transform:translateY(2px); }
  .pad button:hover{ background:var(--accent); color:#120802; box-shadow:0 0 12px var(--accent); }
  .pad .blank{ border:none; background:transparent; cursor:default; }
  .pad .blank:hover{ background:transparent; box-shadow:none; }
  .row2{ display:flex; gap:12px; margin-top:14px; }
  .row2 .btn{ margin-top:0; }
  .btn.alt{ background:var(--cyan); box-shadow:0 4px 0 #1a8c88; }
  .btn.alt:active{ box-shadow:0 1px 0 #1a8c88; }
</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">PUSHBOT</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>LEVEL <b id="level">1</b></span>
      <span>MOVES <b id="moves">0</b></span>
      <span>BEST <b id="best">—</b></span>
    </div>
    <canvas id="cv" width="440" height="440"></canvas>
    <p class="status" id="status">Push every box onto a target.</p>
    <div class="pad">
      <span class="blank"></span>
      <button data-dir="up">▲</button>
      <span class="blank"></span>
      <button data-dir="left">◀</button>
      <span class="blank"></span>
      <button data-dir="right">▶</button>
      <span class="blank"></span>
      <button data-dir="down">▼</button>
      <span class="blank"></span>
    </div>
    <div class="row2">
      <button class="btn alt" id="undo">UNDO</button>
      <button class="btn" id="reset">RESET</button>
    </div>
    <p class="hint">Move <span class="key">↑↓←→</span>/<span class="key">WASD</span> &nbsp; Undo <span class="key">U</span> &nbsp; Reset <span class="key">R</span></p>
  </div>
<script>
// Hand-made, solvable levels. # wall, @ player, $ box, . target, * box-on-target, + player-on-target
const RAW=[
// Level 1: one box, push right onto target
[
"#######",
"#     #",
"# @$ .#",
"#     #",
"#######"
],
// Level 2: two boxes, push each outward onto a target
[
"#######",
"#.   .#",
"# $@$ #",
"#     #",
"#######"
],
// Level 3: three boxes, targets above and below the player
[
"########",
"#      #",
"#  .   #",
"# $$$  #",
"#  @   #",
"#  ..  #",
"########"
],
// Level 4: push boxes onto a 2x2-ish target cluster
[
"########",
"#  ..  #",
"#  $$  #",
"#  @   #",
"#  $$  #",
"#  ..  #",
"########"
]
];

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const statusEl=document.getElementById('status');
const levelEl=document.getElementById('level');
const movesEl=document.getElementById('moves');
const bestEl=document.getElementById('best');

let lvl=0, walls, targets, boxes, player, rows, cols, moves, history, locked, tile, ox, oy;

function load(i){
  const map=RAW[i];
  rows=map.length; cols=Math.max(...map.map(r=>r.length));
  walls=[]; targets=[]; boxes=[]; player=null;
  for(let y=0;y<rows;y++){
    walls[y]=[]; targets[y]=[];
    const line=map[y];
    for(let x=0;x<cols;x++){
      const ch=line[x]||' ';
      walls[y][x]= ch==='#';
      targets[y][x]= (ch==='.'||ch==='*'||ch==='+');
      if(ch==='$'||ch==='*') boxes.push({x,y});
      if(ch==='@'||ch==='+') player={x,y};
    }
  }
  moves=0; history=[]; locked=false;
  movesEl.textContent=0; levelEl.textContent=(i+1);
  const b=localStorage.getItem('sk_best_'+i);
  bestEl.textContent=b?b:'—';
  statusEl.textContent='Push every box onto a target.';
  statusEl.style.color='var(--ink)';
  layout(); draw();
}

function layout(){
  const size=cv.width;
  tile=Math.floor(Math.min(size/cols, size/rows));
  ox=Math.floor((size-tile*cols)/2);
  oy=Math.floor((size-tile*rows)/2);
}

function boxAt(x,y){ return boxes.find(b=>b.x===x&&b.y===y); }

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#050109'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    const px=ox+x*tile, py=oy+y*tile;
    if(walls[y][x]){
      ctx.fillStyle='#241433';
      ctx.fillRect(px,py,tile-1,tile-1);
      ctx.strokeStyle='rgba(177,75,255,.5)'; ctx.lineWidth=1;
      ctx.strokeRect(px+.5,py+.5,tile-2,tile-2);
    } else {
      ctx.fillStyle='#0a0418'; ctx.fillRect(px,py,tile-1,tile-1);
    }
    if(targets[y][x]){
      ctx.save();
      ctx.strokeStyle='#25f4ee'; ctx.lineWidth=2; ctx.shadowColor='#25f4ee'; ctx.shadowBlur=8;
      const m=tile*0.30;
      ctx.strokeRect(px+m,py+m,tile-1-2*m,tile-1-2*m);
      ctx.restore();
    }
  }
  // boxes
  for(const b of boxes){
    const px=ox+b.x*tile, py=oy+b.y*tile;
    const on=targets[b.y][b.x];
    ctx.save();
    ctx.shadowBlur=12; ctx.shadowColor= on?'#acff3d':'#ff8a2a';
    const g=ctx.createLinearGradient(px,py,px,py+tile);
    if(on){ g.addColorStop(0,'#d4ff8a'); g.addColorStop(1,'#8fd633'); }
    else { g.addColorStop(0,'#ffc080'); g.addColorStop(1,'#ff8a2a'); }
    ctx.fillStyle=g;
    const m=tile*0.12;
    ctx.fillRect(px+m,py+m,tile-1-2*m,tile-1-2*m);
    ctx.restore();
  }
  // player
  const px=ox+player.x*tile, py=oy+player.y*tile;
  ctx.save();
  ctx.shadowBlur=14; ctx.shadowColor='#ff2e97';
  ctx.fillStyle='#ff2e97';
  ctx.beginPath();
  ctx.arc(px+tile/2, py+tile/2, tile*0.32, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function move(dx,dy){
  if(locked) return;
  const nx=player.x+dx, ny=player.y+dy;
  if(walls[ny]?.[nx]) return;
  const box=boxAt(nx,ny);
  if(box){
    const bx=nx+dx, by=ny+dy;
    if(walls[by]?.[bx]) return;
    if(boxAt(bx,by)) return; // can't push two boxes
    history.push({px:player.x,py:player.y,box:box,fromX:box.x,fromY:box.y});
    box.x=bx; box.y=by;
    SFX.place();
    if(targets[by]?.[bx]) SFX.coin();
  } else {
    history.push({px:player.x,py:player.y,box:null});
    SFX.move();
  }
  player.x=nx; player.y=ny;
  moves++; movesEl.textContent=moves;
  draw();
  if(solved()) win();
}

function undo(){
  if(locked||!history.length) return;
  SFX.select();
  const h=history.pop();
  if(h.box){ h.box.x=h.fromX; h.box.y=h.fromY; }
  player.x=h.px; player.y=h.py;
  moves++; movesEl.textContent=moves; // undo counts as a move
  draw();
}

function solved(){ return boxes.every(b=>targets[b.y][b.x]); }

function win(){
  locked=true;
  const key='sk_best_'+lvl;
  const prev=+(localStorage.getItem(key)||Infinity);
  if(moves<prev){ localStorage.setItem(key,moves); bestEl.textContent=moves; }
  if(lvl<RAW.length-1){
    SFX.win();
    statusEl.textContent='★ LEVEL CLEAR ★';
    statusEl.style.color='var(--lime)';
    setTimeout(()=>{ lvl++; load(lvl); }, 1100);
  } else {
    SFX.powerup();
    statusEl.textContent='★ ALL CLEAR! ★ You beat every level!';
    statusEl.style.color='var(--amber)';
  }
}

const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k==='arrowup'||k==='w') move(0,-1);
  else if(k==='arrowdown'||k==='s') move(0,1);
  else if(k==='arrowleft'||k==='a') move(-1,0);
  else if(k==='arrowright'||k==='d') move(1,0);
  else if(k==='u') undo();
  else if(k==='r'){ SFX.select(); load(lvl); }
});

document.querySelectorAll('.pad button[data-dir]').forEach(b=>{
  b.addEventListener('click',()=>{ const d=DIRS[b.dataset.dir]; move(d[0],d[1]); });
});
document.getElementById('undo').addEventListener('click',undo);
document.getElementById('reset').addEventListener('click',()=>{ SFX.select(); load(lvl); });

load(0);
</script>
</body>
</html>
