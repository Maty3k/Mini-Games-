<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRICKWAVE — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>:root{ --accent: var(--neon-cyan); }</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">BRICKWAVE</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>LIVES <b id="lives">3</b></span>
    </div>
    <canvas id="c" width="440" height="440"></canvas>
    <button class="btn" id="start">PRESS START</button>
    <p class="hint">
      <span class="key">← →</span> / <span class="key">A D</span> or move mouse · clear all bricks
    </p>
  </div>

<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const scoreEl=document.getElementById('score'), livesEl=document.getElementById('lives'), startBtn=document.getElementById('start');

const COLS=10, ROWS=6, PAD=4, BW=(W-PAD)/COLS, BH=18, TOP=46;
const COLORS=['#ff2e88','#9d5cff','#21f3ff','#b6ff3d','#ffce3a','#ff7b3d'];
let bricks, paddle, ball, score, lives, running, raf;

function reset(){
  bricks=[];
  for(let r=0;r<ROWS;r++)for(let cI=0;cI<COLS;cI++)
    bricks.push({x:PAD+cI*BW, y:TOP+r*(BH+PAD), alive:true, c:COLORS[r%COLORS.length]});
  paddle={w:84,h:12,x:W/2-42,y:H-26};
  resetBall();
  score=0; lives=3; scoreEl.textContent=0; livesEl.textContent=3;
}
function resetBall(){ ball={x:W/2,y:H-44,r:7,vx:3.4*(Math.random()<.5?1:-1),vy:-3.8}; }

function draw(){
  ctx.fillStyle='#050109'; ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{ if(!b.alive)return;
    ctx.fillStyle=b.c; ctx.shadowColor=b.c; ctx.shadowBlur=8;
    ctx.fillRect(b.x,b.y,BW-PAD,BH);
  });
  ctx.shadowBlur=10;
  ctx.fillStyle='#21f3ff'; ctx.shadowColor='#21f3ff';
  ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  ctx.beginPath(); ctx.fillStyle='#f4e9ff'; ctx.shadowColor='#fff';
  ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.fill();
  ctx.shadowBlur=0;
}
function step(){
  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.x<ball.r||ball.x>W-ball.r){ ball.vx*=-1; SFX.bounce(); }
  if(ball.y<ball.r){ ball.vy*=-1; SFX.bounce(); }
  // paddle
  if(ball.y+ball.r>=paddle.y && ball.y<paddle.y+paddle.h &&
     ball.x>paddle.x && ball.x<paddle.x+paddle.w && ball.vy>0){
    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.vx=hit*4.6; ball.vy=-Math.abs(ball.vy);
    SFX.bounce();
  }
  // bricks
  for(const b of bricks){ if(!b.alive)continue;
    if(ball.x>b.x && ball.x<b.x+BW-PAD && ball.y-ball.r<b.y+BH && ball.y+ball.r>b.y){
      b.alive=false; ball.vy*=-1; score+=10; scoreEl.textContent=score; SFX.hit(); break;
    }
  }
  if(ball.y>H+20){
    lives--; livesEl.textContent=lives;
    if(lives<=0) return end('GAME OVER');
    SFX.lose();
    resetBall();
  }
  if(bricks.every(b=>!b.alive)) return end('YOU WIN!');
  draw();
  raf=requestAnimationFrame(step);
}
function end(msg){
  running=false; cancelAnimationFrame(raf); draw();
  if(msg==='YOU WIN!') SFX.win(); else SFX.gameover();
  ctx.fillStyle='rgba(5,1,9,.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle = msg==='YOU WIN!' ? '#b6ff3d' : '#ff2e88';
  ctx.font='24px "Press Start 2P", monospace'; ctx.fillText(msg,W/2,H/2-6);
  ctx.fillStyle='#21f3ff'; ctx.font='12px "Press Start 2P", monospace';
  ctx.fillText('SCORE '+score,W/2,H/2+28);
  startBtn.textContent='PLAY AGAIN'; startBtn.style.display='inline-block';
}
function begin(){ reset(); startBtn.style.display='none'; running=true; cancelAnimationFrame(raf); step(); }
startBtn.onclick=()=>{ SFX.select(); begin(); };

let left=false,right=false;
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a')left=true; if(k==='arrowright'||k==='d')right=true;});
addEventListener('keyup',e=>{const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a')left=false; if(k==='arrowright'||k==='d')right=false;});
function movePaddle(){ if(running){
  if(left)paddle.x-=6; if(right)paddle.x+=6;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x)); }
  requestAnimationFrame(movePaddle);
}
movePaddle();
function pointTo(clientX){ const r=cv.getBoundingClientRect();
  const x=(clientX-r.left)*(W/r.width); paddle.x=Math.max(0,Math.min(W-paddle.w,x-paddle.w/2)); }
cv.addEventListener('mousemove',e=>pointTo(e.clientX));
cv.addEventListener('touchmove',e=>{pointTo(e.touches[0].clientX);},{passive:true});

reset(); draw();
</script>
</body>
</html>
