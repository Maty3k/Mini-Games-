<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASHBACK — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>
  :root{ --accent: var(--neon-amber); }
  .board{
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
    width:100%; max-width:440px; margin-top:4px;
  }
  .tile{
    aspect-ratio:1; position:relative; cursor:pointer;
    perspective:600px; background:transparent; border:none; padding:0;
  }
  .inner{
    position:absolute; inset:0; transition:transform .35s;
    transform-style:preserve-3d;
  }
  .tile.flip .inner, .tile.done .inner{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    display:flex; align-items:center; justify-content:center;
    border-radius:6px; font-size:clamp(28px,8vw,40px);
  }
  .front{
    background:linear-gradient(150deg,#1c0e33,#0c0618);
    border:2px solid var(--neon-violet);
    color:var(--neon-violet); box-shadow:inset 0 0 16px rgba(157,92,255,.3);
  }
  .front::after{ content:"?"; font-family:'Press Start 2P',monospace; font-size:20px; }
  .back{
    transform:rotateY(180deg);
    background:#050109; border:2px solid var(--neon-amber);
    box-shadow:0 0 12px var(--neon-amber);
  }
  .tile.done .back{ border-color:var(--neon-lime); box-shadow:0 0 14px var(--neon-lime); opacity:.85; }
  .win{
    font-family:'Press Start 2P',monospace; color:var(--neon-lime);
    text-shadow:0 0 12px var(--neon-lime); font-size:18px; margin-top:18px; text-align:center;
    min-height:22px;
  }
</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">FLASHBACK</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud">
      <span>MOVES <b id="moves">0</b></span>
      <span>TIME <b id="time">0</b>s</span>
    </div>
    <div class="board" id="board"></div>
    <p class="win" id="win"></p>
    <button class="btn" id="restart">NEW GAME</button>
    <p class="hint">Flip two cards · find all <b style="color:var(--neon-amber)">8</b> pairs</p>
  </div>

<script>
const EMOJI=['👾','🕹️','💾','🎮','🚀','⭐','🍒','💎'];
const board=document.getElementById('board'), movesEl=document.getElementById('moves'),
      timeEl=document.getElementById('time'), winEl=document.getElementById('win'),
      restart=document.getElementById('restart');
let first=null, lock=false, moves, matched, timer, secs, started;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function newGame(){
  board.innerHTML=''; winEl.textContent=''; first=null; lock=false;
  moves=0; matched=0; secs=0; started=false;
  movesEl.textContent=0; timeEl.textContent=0;
  clearInterval(timer);
  shuffle([...EMOJI,...EMOJI]).forEach(sym=>{
    const t=document.createElement('button'); t.className='tile';
    t.innerHTML=`<span class="inner"><span class="face front"></span><span class="face back">${sym}</span></span>`;
    t.dataset.sym=sym;
    t.onclick=()=>flip(t);
    board.appendChild(t);
  });
}
function flip(t){
  if(lock||t.classList.contains('flip')||t.classList.contains('done')) return;
  if(!started){ started=true; timer=setInterval(()=>{secs++;timeEl.textContent=secs;},1000); }
  t.classList.add('flip'); SFX.flip();
  if(!first){ first=t; return; }
  moves++; movesEl.textContent=moves; lock=true;
  if(first.dataset.sym===t.dataset.sym){
    setTimeout(()=>{ first.classList.add('done'); t.classList.add('done'); first=null; lock=false;
      SFX.match(); matched++; if(matched===EMOJI.length) win(); },300);
  } else {
    setTimeout(()=>{ first.classList.remove('flip'); t.classList.remove('flip'); first=null; lock=false; },750);
  }
}
function win(){
  clearInterval(timer);
  SFX.win();
  winEl.textContent=`★ CLEARED IN ${moves} MOVES / ${secs}s ★`;
}
restart.onclick=()=>{ SFX.select(); newGame(); };
newGame();
</script>
</body>
</html>
