<style>:root{ --accent: var(--neon-pink); }
  .race-wrap{ position:relative; width:100%; max-width:700px; }
  .race-wrap canvas#c{ width:100%; display:block; border-radius:6px; }
  .minimap{ position:absolute; top:10px; right:10px; width:144px; height:144px;
    background:rgba(6,2,16,.45); border:2px solid var(--neon-cyan); border-radius:6px; box-shadow:0 0 10px rgba(37,244,238,.5); }
  .speedo{ position:absolute; right:12px; bottom:10px; text-align:right; line-height:1;
    font-family:'Press Start 2P',monospace; color:#fff; text-shadow:0 0 8px #000,0 0 12px var(--neon-cyan); pointer-events:none; }
  .speedo b{ font-size:38px; } .speedo span{ font-size:10px; color:#bfe9ff; }
  .drs{ position:absolute; right:14px; bottom:66px; font-family:'Press Start 2P',monospace; font-size:14px; letter-spacing:1px; display:none; pointer-events:none; }
  .drs.avail{ display:block; color:#7a8a99; }
  .drs.on{ display:block; color:#18ff5a; text-shadow:0 0 8px #18ff5a,0 0 18px #18ff5a; animation:drsflash .4s steps(1) infinite; }
  @keyframes drsflash{ 50%{ opacity:.35; } }
  .settings{ display:flex; flex-wrap:wrap; gap:10px 18px; justify-content:center; align-items:center;
    margin-top:14px; font-family:'Press Start 2P',monospace; font-size:10px; color:#cdbfe0; }
  .settings .setrow{ display:flex; align-items:center; gap:7px; }
  .settings .lbl{ color:var(--neon-cyan); letter-spacing:1px; }
  .settings b{ color:var(--neon-amber); min-width:16px; text-align:center; display:inline-block; }
  .settings .sbtn,.settings .dbtn{ font-family:'Press Start 2P',monospace; cursor:pointer; color:#cdbfe0;
    background:rgba(20,8,42,.6); border:2px solid rgba(157,92,255,.5); border-radius:4px; }
  .settings .sbtn{ width:24px; height:24px; font-size:12px; line-height:1; padding:0; }
  .settings .dbtn{ font-size:8px; padding:6px 8px; }
  .settings .sbtn:hover,.settings .dbtn:hover{ border-color:var(--neon-cyan); color:#fff; }
  .settings .dbtn.on{ background:var(--neon-cyan); color:#04121a; border-color:var(--neon-cyan); }
  .lap-info{ position:absolute; left:12px; top:10px; font-family:'Press Start 2P',monospace;
    font-size:11px; color:#fff; text-shadow:0 0 6px #000; line-height:1.7; pointer-events:none; }
  .lap-info b{ color:var(--neon-amber); }
  .standings{ position:absolute; left:12px; top:84px; font-family:'Press Start 2P',monospace;
    font-size:9px; line-height:1.5; pointer-events:none; }
  .standings .row{ color:#e2e9f0; text-shadow:0 0 5px #000; white-space:nowrap; margin-bottom:5px; }
  .standings .gap{ display:block; font-size:7px; color:#9fb0c4; margin-left:24px; margin-top:2px; }
  .standings .row.me .gap{ color:#e6cf86; }
  .standings .drsmk{ color:#18ff5a; font-size:7px; margin-left:6px; text-shadow:0 0 5px #18ff5a; }
  .standings .row.me{ color:var(--neon-amber); }
  .standings .row .pp{ display:inline-block; width:24px; color:var(--neon-cyan); }
  .standings .row.me .pp{ color:var(--neon-amber); }
  .flag{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace; font-size:32px; color:#fff; text-shadow:0 0 16px #000,0 0 26px var(--neon-pink);
    pointer-events:none; opacity:0; transition:opacity .25s; text-align:center; }
  .touchctl{ position:absolute; inset:0; pointer-events:none; }
  .tbtn{ position:absolute; bottom:12px; width:60px; height:60px; border-radius:50%;
    border:2px solid rgba(255,255,255,.5); background:rgba(10,4,24,.4); color:#fff;
    font-family:'Press Start 2P',monospace; font-size:15px; pointer-events:auto; display:none; align-items:center; justify-content:center; }
  @media (pointer:coarse){ .tbtn{ display:flex; } }
  .tbtn.l{ left:10px; } .tbtn.r{ left:80px; } .tbtn.gas{ right:10px; } .tbtn.brk{ right:80px; }
  .d3-badge{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--neon-violet);
    border:1px solid var(--neon-violet); border-radius:3px; padding:3px 6px; letter-spacing:1px; }
  .status{ font-family:'Press Start 2P',monospace; font-size:12px; color:var(--neon-pink); text-align:center; min-height:14px; margin-top:12px; }
  .fps{ position:absolute; left:12px; top:64px; font-family:'Press Start 2P',monospace; font-size:9px;
    color:#7af6ff; text-shadow:0 0 6px #000,0 0 10px rgba(37,244,238,.6); pointer-events:none; letter-spacing:1px; }
  .tacho{ position:absolute; left:90px; bottom:12px; pointer-events:none; }
  .tacho .rpmbar{ width:120px; height:8px; background:rgba(6,2,16,.7); border:1px solid var(--neon-cyan);
    border-radius:4px; box-shadow:0 0 6px rgba(37,244,238,.5); overflow:hidden; }
  .tacho .rpmbar i{ display:block; height:100%; width:0%; background:#18ff5a; transition:width .05s linear; }
  .tacho .tnums{ font-family:'Press Start 2P',monospace; font-size:9px; color:#cdbfe0; margin-top:5px;
    text-shadow:0 0 6px #000; letter-spacing:1px; }
  .tacho .tnums b{ color:var(--neon-amber); }
</style>

<body>
  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title" id="gtitle">GRAND PRIX</h1>
    <span class="d3-badge">▣ 3D</span>
  </nav>

  <div class="stage">
    <div class="race-wrap">
      <canvas id="c" width="700" height="438"></canvas>
      <canvas class="minimap" id="map" width="144" height="144"></canvas>
      <div class="lap-info">LAP <b id="lap">1</b>/<span id="laptot">3</span> · POS <b id="pos">-</b>/<span id="postot">4</span><br>TIME <b id="cur">0.000</b></div>
      <div class="standings" id="standings"></div>
      <div class="speedo"><b id="kmh">0</b><br><span>KM/H</span></div>
      <div class="drs" id="drs">DRS</div>
      <div class="fps" id="fps">FPS 0</div>
      <div class="tacho" id="tacho"><div class="rpmbar"><i id="rpmfill"></i></div><div class="tnums">GEAR <b id="gear">N</b> · <b id="rpm">0</b> RPM</div></div>
      <div class="flag" id="flag"></div>
      <div class="touchctl">
        <button class="tbtn l" id="tL">◀</button><button class="tbtn r" id="tR">▶</button>
        <button class="tbtn brk" id="tB">▼</button><button class="tbtn gas" id="tG">▲</button>
      </div>
    </div>
    <div class="settings" id="settings" style="display:none">
      <div class="setrow"><span class="lbl">TRACK</span><button class="sbtn" data-act="trk-1">‹</button><b id="setTrk" style="min-width:104px">MELBOURNE</b><button class="sbtn" data-act="trk+1">›</button></div>
      <div class="setrow"><span class="lbl">RIVALS</span><button class="sbtn" data-act="ai-1">−</button><b id="setAi">3</b><button class="sbtn" data-act="ai+1">+</button></div>
      <div class="setrow"><span class="lbl">LAPS</span><button class="sbtn" data-act="lap-1">−</button><b id="setLap">3</b><button class="sbtn" data-act="lap+1">+</button></div>
      <div class="setrow"><span class="lbl">LEVEL</span><button class="dbtn" data-diff="EASY">EASY</button><button class="dbtn on" data-diff="NORMAL">NORMAL</button><button class="dbtn" data-diff="HARD">HARD</button></div>
      <div class="setrow"><span class="lbl">FOV</span><button class="sbtn" data-act="fov-1">−</button><b id="setFov">66</b><button class="sbtn" data-act="fov+1">+</button></div>
      <div class="setrow"><span class="lbl">CAM</span><button class="sbtn" data-act="cam-1">−</button><b id="setCam" style="min-width:64px">CLOSE</b><button class="sbtn" data-act="cam+1">+</button></div>
    </div>
    <p class="status" id="status">Loading circuit & car…</p>
    <button class="btn" id="start" disabled>LOADING…</button>
    <p class="hint"><span class="key">↑</span> throttle · <span class="key">↓</span> brake · <span class="key">← →</span> steer · pads on mobile</p>
  </div>

<script>
const cv=document.getElementById('c'); const W=700,H=438;
const lapEl=document.getElementById('lap'), curEl=document.getElementById('cur'), posEl=document.getElementById('pos'), standEl=document.getElementById('standings'),
      kmhEl=document.getElementById('kmh'), drsEl=document.getElementById('drs'), settingsEl=document.getElementById('settings'), statusEl=document.getElementById('status'), startBtn=document.getElementById('start'),
      flagEl=document.getElementById('flag'), gtitle=document.getElementById('gtitle'),
      fpsEl=document.getElementById('fps'), gearEl=document.getElementById('gear'), rpmEl=document.getElementById('rpm'), rpmFillEl=document.getElementById('rpmfill');
const mapc=document.getElementById('map'), mapx=mapc.getContext('2d');
let bestLap=0;
const fmt=ms=>{ if(!ms) return '--'; return (ms/1000).toFixed(3); };

const renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setSize(W,H,false);
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.85;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xcfdceb, 600, 3400);
const camera=new THREE.PerspectiveCamera(60,W/H,0.5,9000);

// ---- clean gradient sky ----
(function(){ const c=document.createElement('canvas'); c.width=4; c.height=512; const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#2e6fc8'); grd.addColorStop(0.5,'#7fa8da'); grd.addColorStop(0.82,'#bcd0e6'); grd.addColorStop(1,'#dfe7ee');
  g.fillStyle=grd; g.fillRect(0,0,4,512);
  const tx=new THREE.CanvasTexture(c); tx.encoding=THREE.sRGBEncoding; scene.background=tx; })();
// HDRI → PMREM environment for lighting + reflections
let hdrReady=false, carReady=false;
const pmrem=new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
new THREE.RGBELoader().load('assets/venice_sunset_1k.hdr', tex=>{
  const env=pmrem.fromEquirectangular(tex).texture; scene.environment=env; tex.dispose(); pmrem.dispose();
  hdrReady=true; maybeReady();
}, undefined, ()=>{ hdrReady=true; maybeReady(); });
// sun (shadows)
const sunDir=new THREE.Vector3(); { const e=22*Math.PI/180,a=150*Math.PI/180; sunDir.set(Math.cos(e)*Math.sin(a),Math.sin(e),Math.cos(e)*Math.cos(a)); }
const sun=new THREE.DirectionalLight(0xfff1de,2.1); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=440;
const SH=120; sun.shadow.camera.left=-SH; sun.shadow.camera.right=SH; sun.shadow.camera.top=SH; sun.shadow.camera.bottom=-SH; sun.shadow.bias=-0.0005;
scene.add(sun, sun.target);
// permanent grass ground
const grass=new THREE.Mesh(new THREE.PlaneGeometry(14000,14000),new THREE.MeshStandardMaterial({color:0x4a7a39,roughness:1,side:THREE.DoubleSide}));
grass.rotation.x=-Math.PI/2; grass.position.y=-0.06; grass.receiveShadow=true; scene.add(grass);

// ---- shared textures / materials (created once, reused on every track) ----
function asphaltTex(){ const c=document.createElement('canvas'); c.width=256;c.height=512; const g=c.getContext('2d');
  g.fillStyle='#3a3b40'; g.fillRect(0,0,256,512);
  for(let i=0;i<24000;i++){ const v=44+Math.random()*26|0; g.fillStyle=`rgba(${v},${v},${v+4},.6)`; g.fillRect(Math.random()*256,Math.random()*512,1.6,1.6); }
  g.fillStyle='#eef0f4'; g.fillRect(6,0,9,512); g.fillRect(241,0,9,512);
  g.fillStyle='#f3f4f6'; for(let y=0;y<512;y+=72) g.fillRect(123,y,10,42);
  const tx=new THREE.CanvasTexture(c); tx.wrapT=THREE.RepeatWrapping; tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding; return tx; }
function curbTex(){ const c=document.createElement('canvas'); c.width=16;c.height=64; const g=c.getContext('2d');
  for(let i=0;i<8;i++){ g.fillStyle=i%2?'#d62336':'#f2f2f2'; g.fillRect(0,i*8,16,8);} const tx=new THREE.CanvasTexture(c); tx.wrapT=THREE.RepeatWrapping; tx.encoding=THREE.sRGBEncoding; return tx; }
function wallTex(){ const c=document.createElement('canvas'); c.width=64;c.height=64; const g=c.getContext('2d');
  g.fillStyle='#aeb4be'; g.fillRect(0,0,64,64);                        // metal base
  g.fillStyle='#cfd4dc'; g.fillRect(0,8,64,8); g.fillStyle='#cfd4dc'; g.fillRect(0,40,64,8);   // two horizontal rails
  g.fillStyle='#878f9b'; g.fillRect(0,24,64,7);                        // shadow gap
  g.fillStyle='#69707d'; for(let x=2;x<64;x+=16) g.fillRect(x,0,4,64); // posts
  const tx=new THREE.CanvasTexture(c); tx.wrapS=THREE.RepeatWrapping; tx.wrapT=THREE.RepeatWrapping; tx.anisotropy=4; tx.encoding=THREE.sRGBEncoding; return tx; }
function standTex(){ const c=document.createElement('canvas'); c.width=128;c.height=64; const g=c.getContext('2d');
  g.fillStyle='#39414f'; g.fillRect(0,0,128,64);
  g.fillStyle='#2b3240'; for(let y=8;y<64;y+=9) g.fillRect(0,y,128,2);
  const cols=['#e8e8e8','#d8504a','#4a82d8','#e0c23a','#5ac06a','#d87fbf'];
  for(let i=0;i<1000;i++){ g.fillStyle=cols[(Math.random()*cols.length)|0]; g.fillRect(Math.random()*128,Math.random()*60,2,2); }
  const tx=new THREE.CanvasTexture(c); tx.encoding=THREE.sRGBEncoding; return tx; }
function checkerTex(){ const c=document.createElement('canvas'); c.width=128;c.height=16; const g=c.getContext('2d');
  for(let y=0;y<2;y++)for(let x=0;x<16;x++){ g.fillStyle=((x+y)%2)?'#fff':'#111'; g.fillRect(x*8,y*8,8,8);} const tx=new THREE.CanvasTexture(c); tx.encoding=THREE.sRGBEncoding; return tx; }
const roadMat=new THREE.MeshStandardMaterial({map:asphaltTex(),roughness:0.8,metalness:0,side:THREE.DoubleSide});
const curbMat=new THREE.MeshStandardMaterial({map:curbTex(),roughness:0.6,side:THREE.DoubleSide});
const gravelMat=new THREE.MeshStandardMaterial({color:0xc4b89a,roughness:1,side:THREE.DoubleSide});
const wallMat=new THREE.MeshStandardMaterial({map:wallTex(),metalness:0.45,roughness:0.5,side:THREE.DoubleSide});
const gantryMat=new THREE.MeshStandardMaterial({color:0x222228,metalness:0.6,roughness:0.4});
const standMat=new THREE.MeshStandardMaterial({map:standTex(),roughness:0.9});
const startMat=new THREE.MeshStandardMaterial({map:checkerTex(),roughness:0.6});
const trunkM=new THREE.MeshStandardMaterial({color:0x553a23,roughness:1}), leafM=new THREE.MeshStandardMaterial({color:0x356a2c,roughness:1});
const concreteMat=new THREE.MeshStandardMaterial({color:0x9a9a98,roughness:0.9,metalness:0,side:THREE.DoubleSide});
// trackside advertising hoardings — procedural sponsor boards for an authentic circuit look
function adTex(){ const c=document.createElement('canvas'); c.width=512;c.height=64; const g=c.getContext('2d');
  const cols=['#d11d2a','#1565c0','#f9a825','#1b5e20','#ffffff','#111111','#6a1b9a','#00838f','#e64a19','#00897b'];
  const words=['SHELL','PIRELLI','DHL','HEINEKEN','ROLEX','AWS','EMIRATES','PUMA','TAG','MSC','QATAR','CRYPTO','LENOVO','MOBIL 1','RAY-BAN'];
  let x=0; while(x<512){ const w=46+(Math.random()*46|0), bg=cols[(Math.random()*cols.length)|0]; g.fillStyle=bg; g.fillRect(x,0,w,64);
    g.fillStyle=(bg==='#ffffff'||bg==='#f9a825')?'#111':'#fff'; g.font='bold 19px sans-serif'; g.textBaseline='middle'; g.textAlign='center';
    g.fillText(words[(Math.random()*words.length)|0], x+w/2, 34, w-6); x+=w+2; }
  const tx=new THREE.CanvasTexture(c); tx.wrapS=THREE.RepeatWrapping; tx.repeat.set(10,1); tx.anisotropy=8; tx.encoding=THREE.sRGBEncoding; return tx; }
const adMat=new THREE.MeshStandardMaterial({map:adTex(),roughness:0.7,metalness:0,side:THREE.DoubleSide});

// ---- high-quality downloaded textures (assets/textures/) applied over the procedural defaults ----
const texL=new THREE.TextureLoader();
// real asphalt photo, darkened to tarmac grey and composited with lane markings so the road reads as asphalt (not dirt)
texL.load('assets/textures/asphalt_diff.jpg', tx=>{ const img=tx.image, c=document.createElement('canvas'); c.width=256;c.height=512; const g=c.getContext('2d');
  g.drawImage(img,0,0,256,256); g.drawImage(img,0,256,256,256);                       // tile the photo down the strip
  g.globalAlpha=0.55; g.fillStyle='#303135'; g.fillRect(0,0,256,512); g.globalAlpha=1; // cool + darken -> tarmac, kills any brown/dirt cast
  g.fillStyle='#e9ebef'; g.fillRect(5,0,8,512); g.fillRect(243,0,8,512);               // white edge lines
  g.fillStyle='#eef0f4'; for(let y=0;y<512;y+=74) g.fillRect(124,y,8,40);              // centre dashes
  const ct=new THREE.CanvasTexture(c); ct.wrapT=THREE.RepeatWrapping; ct.anisotropy=8; ct.encoding=THREE.sRGBEncoding;
  roadMat.map=ct; roadMat.color.set(0xffffff); roadMat.needsUpdate=true; });
texL.load('assets/textures/asphalt_nor.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(2,120); tx.anisotropy=8;
  roadMat.normalMap=tx; roadMat.normalScale=new THREE.Vector2(0.35,0.35); roadMat.needsUpdate=true; });
texL.load('assets/textures/grass_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(120,120); tx.encoding=THREE.sRGBEncoding; tx.anisotropy=8;
  grass.material.map=tx; grass.material.color.set(0xffffff); grass.material.needsUpdate=true; });
texL.load('assets/textures/sand_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(3,70); tx.encoding=THREE.sRGBEncoding; tx.anisotropy=8;
  gravelMat.map=tx; gravelMat.color.set(0xffffff); gravelMat.needsUpdate=true; });                                  // real sand-trap run-off
texL.load('assets/textures/curb_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(1,30); tx.encoding=THREE.sRGBEncoding; tx.anisotropy=8;
  curbMat.map=tx; curbMat.color.set(0xffffff); curbMat.needsUpdate=true; });                                        // real red/white kerb
texL.load('assets/textures/concrete_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(6,1); tx.encoding=THREE.sRGBEncoding; tx.anisotropy=8;
  concreteMat.map=tx; concreteMat.color.set(0xffffff); concreteMat.needsUpdate=true; });                            // concrete pit wall
texL.load('assets/textures/metal_diff.jpg', tx=>{ tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.anisotropy=8;
  gantryMat.map=tx; gantryMat.color.set(0xb8bcc4); gantryMat.metalness=0.7; gantryMat.roughness=0.4; gantryMat.needsUpdate=true; });  // real metal gantry

// ---- track state (rebuilt per circuit) ----
const SAMP=900;
let P=[],T=[],Nn=[],WL=[],WR=[],EH=[],GR=[],cornerF=[],drsZone=[],TLEN=1,SPM=1,mb={a:0,b:1,c:0,d:1};
const trackGroup=new THREE.Group(); scene.add(trackGroup);
// real-circuit elevation profiles (metres) keyed by lap fraction in racing direction (0 = start/finish).
// Approximate the famous gradients — above all Spa's Eau Rouge/Raidillon climb just after Turn 1.
const ELEV={   // metres, lap fraction from the start/finish line (index 0 after rotation)
  MELBOURNE:[[0,1],[0.3,4],[0.6,2],[0.85,4],[1,1]],            // Albert Park — near flat
  MONZA:[[0,1],[0.5,2],[1,1]],                                   // famously flat
  SILVERSTONE:[[0,2],[0.3,6],[0.6,3],[0.85,6],[1,2]],          // gentle rolls
  SUZUKA:[[0,3],[0.15,10],[0.3,16],[0.45,12],[0.6,6],[0.78,15],[0.9,8],[1,3]],   // figure-8 elevation
  SPA:[[0,12],[0.02,13],[0.045,3],[0.08,7],[0.13,28],[0.17,30],[0.26,25],[0.36,18],[0.48,8],[0.62,12],[0.76,22],[0.88,17],[0.95,14],[1,12]]  // pit straight -> La Source (high) -> Eau Rouge dip -> Raidillon climb -> Kemmel high -> rolling Ardennes
};
function elevSample(prof,frac){ frac=((frac%1)+1)%1;
  for(let k=0;k<prof.length-1;k++){ const a=prof[k],b=prof[k+1];
    if(frac>=a[0]&&frac<=b[0]){ const t=(frac-a[0])/Math.max(1e-6,b[0]-a[0]); return a[1]+(b[1]-a[1])*(0.5-0.5*Math.cos(t*Math.PI)); } }
  return prof[prof.length-1][1]; }
function gradeAt(i){ return GR[i]||0; }
function trackHeightAt(i){ return (P[i]&&P[i].y)||0; }
// smooth road-surface height under the car: interpolate between samples along the track (no stair-step bounce on slopes)
function groundY(){ const i=carIdx, t=T[i]; if(!t) return car.position.y;
  const fwd=(car.position.x-P[i].x)*t.x+(car.position.z-P[i].z)*t.z, seg=Math.max(0.5,TLEN/SAMP);

    a.mesh.add(makeLabel(a.name,aiColors[i])); ai.push(a); } }
function gridSlot(slot){ return { idx:((SAMP-4-slot*4)%SAMP+SAMP)%SAMP, lane:(slot%2?1:-1)*2.6 }; }
function posAI(a){ const i0=Math.floor(a.idx)%SAMP,i1=(i0+1)%SAMP,f=a.idx-Math.floor(a.idx);
  a.mesh.position.set(THREE.MathUtils.lerp(P[i0].x,P[i1].x,f)+Nn[i0].x*a.lane,THREE.MathUtils.lerp(P[i0].y,P[i1].y,f),THREE.MathUtils.lerp(P[i0].z,P[i1].z,f)+Nn[i0].z*a.lane);
  a.mesh.rotation.y=Math.atan2(T[i0].x,T[i0].z); }
function placeGrid(){ ai.forEach((a,i)=>{ const gs=gridSlot(i); a.idx=gs.idx; a.lane=gs.lane; a.lap=0; a.pLap=0; a.armed=false; a.prevHigh=false; a.spd=0; posAI(a); }); }
function updateAI(dt){
  const cars=[{p:pLap*SAMP+carIdx}].concat(ai.map(a=>({p:a.pLap*SAMP+a.idx})));
  for(const a of ai){ const ci=Math.floor(a.idx)%SAMP; let drs=false;
    if(drsZone[ci]){ const myp=a.pLap*SAMP+a.idx; let g=Infinity;
      for(const c of cars){ const d=c.p-myp; if(d>0.5&&d<g) g=d; }
      if(g<Infinity && (g/SPM)/Math.max(22,a.spd)<1.0) drs=true; }
    a.drs=drs;
    a.spd+=(a.base*cornerF[ci]*(drs?1.16:1)-a.spd)*Math.min(1,dt*2.2);
    a.idx=(a.idx+a.spd*dt*SPM)%SAMP; posAI(a);
    if(a.idx>SAMP*0.45&&a.idx<SAMP*0.6) a.armed=true;
    const high=a.idx>SAMP*0.82, low=a.idx<SAMP*0.18;
    if(a.prevHigh&&low) a.pLap++;
    if(a.armed&&a.prevHigh&&low){ a.armed=false; a.lap++; } a.prevHigh=high; } }
const hexc=v=>'#'+('000000'+(v>>>0).toString(16)).slice(-6);
function orderList(){ const list=[{p:pLap*SAMP+carIdx,name:'YOU',col:0xffd319,me:true,spd:Math.abs(speed),drs:playerDrs}];
  ai.forEach(a=>list.push({p:a.pLap*SAMP+a.idx,name:a.name,col:a.col,me:false,spd:a.spd,drs:a.drs})); list.sort((x,y)=>y.p-x.p); return list; }
function standings(){ return orderList().findIndex(s=>s.me)+1; }
function renderStandings(){ const list=orderList(); const myi=list.findIndex(s=>s.me); const pos=myi+1; posEl.textContent=pos;
  gapAhead = myi>0 ? ((list[myi-1].p-list[myi].p)/SPM)/Math.max(22,Math.abs(speed)) : 99;
  standEl.innerHTML=list.map((s,i)=>{ let gap;
    if(i===0) gap='LEADER';
    else { const dm=(list[i-1].p-s.p)/SPM; gap = dm>=TLEN ? '+'+Math.floor(dm/TLEN)+' LAP' : '+'+(dm/Math.max(22,s.spd)).toFixed(1)+'s'; }
    return '<div class="row'+(s.me?' me':'')+'"><span class="pp">P'+(i+1)+'</span><span style="color:'+hexc(s.col)+'">'+s.name+'</span>'+(s.drs?'<span class="drsmk">DRS</span>':'')+'<span class="gap">'+gap+'</span></div>'; }).join(''); return pos; }

// ---- physics / loop ----
let speed,heading,carIdx,lateral,lap,pLap,lapStart,running,raf,lastT,prevIdx,countdown,armed,raceOver;
let fpsSmooth=60, lastFpsUpd=0, carPitch=0;
const gearTops=[12,24,38,54,70,95];
function placeAtStart(){ const gs=gridSlot(cfg.ai), i0=((Math.floor(gs.idx))%SAMP+SAMP)%SAMP;
  car.position.set(P[i0].x+Nn[i0].x*gs.lane,P[i0].y,P[i0].z+Nn[i0].z*gs.lane);
  heading=Math.atan2(T[i0].x,T[i0].z);
  speed=0; carIdx=i0; prevIdx=i0; lateral=0; lap=0; pLap=0; armed=false; carPitch=0; car.rotation.set(0,heading,0); }
function updateIdx(){ let bi=carIdx,bd=1e9;
  for(let k=-6;k<=50;k++){ const i=((carIdx+k)%SAMP+SAMP)%SAMP; const dx=car.position.x-P[i].x,dz=car.position.z-P[i].z,d=dx*dx+dz*dz; if(d<bd){bd=d;bi=i;} }
  prevIdx=carIdx; carIdx=bi; lateral=(car.position.x-P[carIdx].x)*Nn[carIdx].x+(car.position.z-P[carIdx].z)*Nn[carIdx].z; }
let keyL,keyR,keyG,keyB;
function sunFollow(){ sun.position.set(car.position.x+sunDir.x*160,sunDir.y*160,car.position.z+sunDir.z*160); sun.target.position.copy(car.position); sun.target.updateMatrixWorld(); }
const CA=11, CLY=1.2;
function snapCam(){ const fx=Math.sin(heading),fz=Math.cos(heading);
  camera.position.set(car.position.x-fx*cfg.camDist,car.position.y+cfg.camHeight,car.position.z-fz*cfg.camDist); camera.lookAt(car.position.x+fx*CA,car.position.y+CLY,car.position.z+fz*CA);
  camera.fov=cfg.fov; camera.updateProjectionMatrix(); sunFollow(); }
function followCam(sp){ const fx=Math.sin(heading),fz=Math.cos(heading);
  camera.position.lerp(new THREE.Vector3(car.position.x-fx*cfg.camDist,car.position.y+cfg.camHeight,car.position.z-fz*cfg.camDist),0.15);
  camera.lookAt(car.position.x+fx*CA,car.position.y+CLY,car.position.z+fz*CA);
  camera.fov=cfg.fov; camera.updateProjectionMatrix(); sunFollow(); }
function frame(now){ if(!running) return; const dt=Math.min(0.05,(now-lastT)/1000||0.016); lastT=now;
  if(countdown>0){ countdown-=dt; flagEl.textContent=countdown>2.1?'3':countdown>1.05?'2':countdown>0.05?'1':'GO!'; flagEl.style.opacity=1;
    if(countdown<=0){ setTimeout(()=>flagEl.style.opacity=0,650); lapStart=now; SFX.coin(); } followCam(0); composer.render(); drawMap(); raf=requestAnimationFrame(frame); return; }
  const offTrack=lateral>WL[carIdx]||lateral<-WR[carIdx];
  const drsOn = !offTrack && drsZone[carIdx] && gapAhead<1.0;
  const maxSpd=offTrack?26:(drsOn?92:78), power=offTrack?7:(drsOn?15:12);
  if(keyG) speed+=power*dt; else if(keyB) speed-=(speed>0?40:15)*dt; else speed-=Math.sign(speed)*4*dt;
  speed -= (power/(maxSpd*maxSpd))*speed*Math.abs(speed)*dt;     // air+rolling drag -> top speed approached gradually, not instantly
  speed -= gradeAt(carIdx)*9.0*dt;                               // hills bite: climbing bleeds speed, descents add it
  if(Math.abs(speed)<0.35&&!keyG&&!keyB) speed=0; if(speed>maxSpd*1.04) speed=maxSpd*1.04; if(speed<-15) speed=-15;
  const grip=Math.min(1,Math.abs(speed)/11);
  heading+=((keyL?1:0)-(keyR?1:0))*1.35*grip*dt*Math.sign(speed||1);
  const fx=Math.sin(heading),fz=Math.cos(heading); car.position.x+=fx*speed*dt; car.position.z+=fz*speed*dt;
  car.rotation.y=heading; car.rotation.z=-((keyL?1:0)-(keyR?1:0))*grip*0.03;
  const ws=speed*dt/0.35; wheels.forEach(w=>w.rotation.x+=ws); const st=((keyL?1:0)-(keyR?1:0))*0.4; frontWheels.forEach(w=>w.rotation.y=st);
  updateIdx();
  car.position.y = groundY();                                                  // glue to the interpolated road surface — no bounce
  carPitch += (Math.atan(gradeAt(carIdx)) - carPitch)*Math.min(1,dt*5);        // smooth nose-up/down on gradients
  car.rotation.x = -carPitch;
  const eL=WL[carIdx]+6.3,eR=WR[carIdx]+6.3;   // hit the Armco wall (just inside the visible barrier)
  if(lateral>eL||lateral<-eR){ const lim=lateral>0?eL:-eR,over=lateral-lim,s=Nn[carIdx]; car.position.x-=s.x*over; car.position.z-=s.z*over; if(Math.abs(speed)>16) SFX.hit(); speed*=0.4; }
  updateAI(dt);
  for(const a of ai){ const dx=car.position.x-a.mesh.position.x,dz=car.position.z-a.mesh.position.z,d=Math.hypot(dx,dz);
    if(d<3.4&&d>0.01){ const pu=(3.4-d)*0.6; car.position.x+=dx/d*pu; car.position.z+=dz/d*pu; speed*=0.985; } }
  renderStandings();
  if(prevIdx>SAMP*0.82&&carIdx<SAMP*0.18) pLap++;
  if(carIdx>SAMP*0.45&&carIdx<SAMP*0.6) armed=true;
  if(armed&&prevIdx>SAMP*0.82&&carIdx<SAMP*0.18){ armed=false;
    if(lap>0){ const t=now-lapStart; if(!bestLap||t<bestLap){ bestLap=t; localStorage['neonBest_'+TRACKS[cfg.track].name]=Math.round(t); flash('FAST LAP '+fmt(t)); SFX.powerup(); } else { flash('LAP '+fmt(t)); SFX.tick(); } }
    lap++; lapStart=now;
    if(lap>=TOTAL_LAPS){ lapEl.textContent=TOTAL_LAPS; return finishRace(now); }
    lapEl.textContent=Math.min(lap+1,TOTAL_LAPS); }
  if(lap>0) curEl.textContent=((now-lapStart)/1000).toFixed(3);
  kmhEl.textContent=Math.round(Math.abs(speed)*3.6);
  // FPS counter (smoothed, throttled to ~4x/sec)
  fpsSmooth += ((1/Math.max(dt,1e-3)) - fpsSmooth)*0.1;
  if(now-lastFpsUpd>250){ lastFpsUpd=now; fpsEl.textContent='FPS '+Math.round(fpsSmooth); }
  // RPM gauge + gear (simulated from speed)
  { const sp=Math.abs(speed);
    if(speed<-1){ gearEl.textContent='R'; }
    else if(sp<0.5){ gearEl.textContent='N'; }
    let gi=gearTops.findIndex(t=>sp<=t); if(gi<0) gi=gearTops.length-1;
    const prevTop=gi>0?gearTops[gi-1]:0, top=gearTops[gi];
    let rpm=1200; if(sp>=0.5){ rpm=1200+(sp-prevTop)/Math.max(0.001,top-prevTop)*(9500-1200); }
    rpm=Math.max(1200,Math.min(9500,rpm));
    if(speed>=-1&&sp>=0.5) gearEl.textContent=(gi+1);
    rpmEl.textContent=Math.round(rpm/100)*100;
    const pct=rpm/9500*100; rpmFillEl.style.width=pct.toFixed(0)+'%';
    rpmFillEl.style.background = pct<70 ? '#18ff5a' : (pct<90 ? '#ffb020' : '#ff2e3a'); }
  playerDrs=drsOn; drsEl.className='drs'+(drsOn?' on':(drsZone[carIdx]?' avail':''));
  if(drsOn&&!prevDrs) SFX.coin(); prevDrs=drsOn;
  followCam(speed); composer.render(); drawMap(); raf=requestAnimationFrame(frame); }
let flashT; function flash(t){ flagEl.textContent=t; flagEl.style.opacity=1; clearTimeout(flashT); flashT=setTimeout(()=>flagEl.style.opacity=0,1700); }
function setupRace(){ TOTAL_LAPS=cfg.laps; buildAI();
  if(!youLabelAdded){ car.add(makeLabel('YOU',0xffd319)); youLabelAdded=true; }
  document.getElementById('laptot').textContent=cfg.laps; document.getElementById('postot').textContent=cfg.ai+1;
  placeAtStart(); placeGrid(); renderStandings(); snapCam(); composer.render(); drawMap(); }

function finishRace(now){ raceOver=true; running=false; cancelAnimationFrame(raf);
  const pos=standings();
  flagEl.textContent = pos===1 ? '🏁 P1 — WIN!' : 'FINISHED P'+pos+'/'+(cfg.ai+1); flagEl.style.opacity=1;
  statusEl.textContent = pos===1 ? '★ VICTORY — P1 ★' : 'Race over · you finished P'+pos;
  statusEl.style.color = pos===1 ? 'var(--neon-lime)' : 'var(--neon-pink)';
  if(pos===1) SFX.win(); else SFX.gameover();
  startBtn.textContent='RACE AGAIN'; startBtn.style.display='inline-block'; settingsEl.style.display=''; followCam(0); composer.render(); }

function begin(){ if(startBtn.disabled) return; SFX.select(); raceOver=false; setupRace();
  settingsEl.style.display='none'; running=true; countdown=3.2; lapEl.textContent=1;
  statusEl.textContent='GET READY'; statusEl.style.color='var(--neon-lime)'; startBtn.style.display='none';
  cancelAnimationFrame(raf); lastT=performance.now(); raf=requestAnimationFrame(frame); }
startBtn.onclick=begin;
// ---- options menu ----
function loadBest(){ bestLap=+(localStorage['neonBest_'+TRACKS[cfg.track].name]||0); }
const CAM_PRESETS=[{dist:4.8,height:2.0},{dist:8,height:3.2},{dist:12,height:4.5}];
const CAM_NAMES=['CLOSE','MID','FAR'];
function refreshSettings(){ document.getElementById('setAi').textContent=cfg.ai; document.getElementById('setLap').textContent=cfg.laps;
  document.getElementById('setTrk').textContent=TRACKS[cfg.track].name;
  document.getElementById('setFov').textContent=cfg.fov; document.getElementById('setCam').textContent=CAM_NAMES[cfg.camPreset];
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('on', b.dataset.diff===cfg.diff)); }
settingsEl.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b||running) return;
  const a=b.dataset.act; let trkChanged=false;
  if(a==='ai-1') cfg.ai=Math.max(1,cfg.ai-1); else if(a==='ai+1') cfg.ai=Math.min(7,cfg.ai+1);
  else if(a==='lap-1') cfg.laps=Math.max(1,cfg.laps-1); else if(a==='lap+1') cfg.laps=Math.min(15,cfg.laps+1);
  else if(a==='trk-1'){ cfg.track=(cfg.track-1+TRACKS.length)%TRACKS.length; trkChanged=true; }
  else if(a==='trk+1'){ cfg.track=(cfg.track+1)%TRACKS.length; trkChanged=true; }
  else if(a==='fov-1') cfg.fov=Math.max(50,cfg.fov-3); else if(a==='fov+1') cfg.fov=Math.min(95,cfg.fov+3);
  else if(a==='cam-1'||a==='cam+1'){ cfg.camPreset=Math.max(0,Math.min(2,cfg.camPreset+(a==='cam+1'?1:-1))); const cp=CAM_PRESETS[cfg.camPreset]; cfg.camDist=cp.dist; cfg.camHeight=cp.height; }
  else if(b.dataset.diff) cfg.diff=b.dataset.diff;
  if(trkChanged){ buildTrack(TRACKS[cfg.track]); loadBest(); gtitle.textContent=TRACKS[cfg.track].name; }
  refreshSettings(); try{SFX.select();}catch(_){}
  if(hdrReady&&carReady) setupRace(); });
function setk(e,v){ const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a'){keyL=v;e.preventDefault();} else if(k==='arrowright'||k==='d'){keyR=v;e.preventDefault();}
  else if(k==='arrowup'||k==='w'){keyG=v;e.preventDefault();} else if(k==='arrowdown'||k==='s'){keyB=v;e.preventDefault();} }
addEventListener('keydown',e=>setk(e,true)); addEventListener('keyup',e=>setk(e,false));
function hold(id,set){ const el=document.getElementById(id); el.addEventListener('pointerdown',e=>{e.preventDefault();set(true);}); el.addEventListener('pointerup',e=>{e.preventDefault();set(false);}); el.addEventListener('pointerleave',()=>set(false)); }
hold('tL',v=>keyL=v); hold('tR',v=>keyR=v); hold('tG',v=>keyG=v); hold('tB',v=>keyB=v);

function maybeReady(){
  if(hdrReady&&carReady){ setupRace(); refreshSettings(); settingsEl.style.display=''; startBtn.disabled=false; startBtn.textContent='PRESS START'; statusEl.textContent='Pick a circuit · set up your race'; statusEl.style.color='var(--neon-pink)'; }
  else { placeAtStart(); snapCam(); composer.render(); drawMap(); } }
// ---- init ----
buildTrack(TRACKS[cfg.track]); loadBest(); gtitle.textContent=TRACKS[cfg.track].name;
placeAtStart(); snapCam(); composer.render(); drawMap();
</script>
</body>
