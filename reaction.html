<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUICKDRAW — Neon Arcade</title>
<link rel="stylesheet" href="style.css">
<script src="sfx.js"></script>
<style>:root{ --accent: var(--magenta); }
  .panel{ width:100%; max-width:440px; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .pad{ width:100%; height:230px; border-radius:10px; border:3px solid var(--accent);
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
        cursor:pointer; user-select:none; -webkit-user-select:none; text-align:center;
        background:#0a0418; transition:background .05s ease; box-shadow:0 0 16px rgba(255,54,208,.4); }
  .pad .big{ font-family:'Press Start 2P',monospace; font-size:24px; letter-spacing:2px; }
  .pad .sub{ font-family:'Press Start 2P',monospace; font-size:11px; color:#04121a; }
  .pad.idle{ background:linear-gradient(180deg,#1a0b33,#0a0418); border-color:var(--magenta); }
  .pad.idle .big{ color:var(--magenta); text-shadow:0 0 10px var(--magenta); }
  .pad.wait{ background:#5a0a1f; border-color:var(--pink); }
  .pad.wait .big{ color:#fff; text-shadow:0 0 10px var(--pink); }
  .pad.go{ background:var(--lime); border-color:var(--lime); box-shadow:0 0 26px var(--lime); }
  .pad.go .big{ color:#04121a; }
  .pad.done{ background:linear-gradient(180deg,#06231f,#0a0418); border-color:var(--cyan); }
  .pad.done .big{ color:var(--cyan); text-shadow:0 0 10px var(--cyan); }
  .pad.early{ background:#3a0a1f; border-color:var(--pink); }
  .pad.early .big{ color:var(--pink); text-shadow:0 0 10px var(--pink); }
  .rounds{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; width:100%; }
  .slot{ font-family:'Press Start 2P',monospace; font-size:10px; padding:7px 6px; min-width:54px;
         text-align:center; border:2px solid #3a2d52; border-radius:5px; color:#8a79b0; background:#120826; }
  .slot.filled{ border-color:var(--lime); color:var(--lime); text-shadow:0 0 6px var(--lime); }
  .slot.early{ border-color:var(--pink); color:var(--pink); }
  .status{ font-family:'Press Start 2P',monospace; font-size:13px; text-align:center;
           min-height:20px; letter-spacing:1px; line-height:1.6; color:var(--amber); }
</style>
</head>
<body>
  <div class="crt-on" aria-hidden="true"></div>
  <div class="crt-lines" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>

  <nav class="gamebar">
    <a class="back" href="index.html">‹ ARCADE</a>
    <h1 class="game-title">QUICKDRAW</h1>
    <span style="width:84px"></span>
  </nav>

  <div class="stage">
    <div class="hud" style="max-width:440px">
      <span>AVG <b id="avg">—</b></span>
      <span>BEST <b id="best">—</b></span>
    </div>
    <div class="panel">
      <div class="pad idle" id="pad">
        <span class="big" id="padBig">REACTION</span>
        <span class="sub" id="padSub"></span>
      </div>
      <div class="rounds" id="rounds"></div>
      <p class="status" id="status">5 ROUNDS — PRESS START</p>
    </div>
    <button class="btn" id="reset">START</button>
    <p class="hint">Tap the panel or press <span class="key">SPACE</span> when it turns green. Don't jump early!</p>
  </div>
<script>
(function(){
  const KEY="reaction.best";
  const ROUNDS=5;
  const pad=document.getElementById('pad');
  const padBig=document.getElementById('padBig');
  const padSub=document.getElementById('padSub');
  const roundsEl=document.getElementById('rounds');
  const statusEl=document.getElementById('status');
  const avgEl=document.getElementById('avg');
  const bestEl=document.getElementById('best');
  const startBtn=document.getElementById('reset');

  let best=parseInt(localStorage.getItem(KEY)||"0",10)||0;
  bestEl.textContent=best?best+"ms":"—";

  // state: 'idle' | 'wait' | 'go' | 'done'
  let state="idle";
  let round=0;
  let times=[];
  let goAt=0;
  let timer=null;

  const slots=[];
  for(let i=0;i<ROUNDS;i++){
    const s=document.createElement('div');
    s.className='slot'; s.textContent="—";
    roundsEl.appendChild(s); slots.push(s);
  }

  function setPad(cls,big,sub){
    pad.className="pad "+cls;
    padBig.textContent=big;
    padSub.textContent=sub||"";
  }

  let newBest=false;

  function startSession(){
    SFX.select();
    clearTimeout(timer);
    round=0; times=[]; newBest=false;
    slots.forEach(s=>{ s.className='slot'; s.textContent="—"; });
    avgEl.textContent="—";
    startBtn.textContent="RESET";
    nextRound();
  }

  function nextRound(){
    if(round>=ROUNDS){ finish(); return; }
    state="wait";
    setPad("wait","WAIT...","watch for green");
    statusEl.textContent="ROUND "+(round+1)+" / "+ROUNDS;
    const delay=1500+Math.random()*2500; // 1.5 - 4s
    timer=setTimeout(()=>{
      if(state!=="wait") return;
      state="go";
      goAt=performance.now();
      setPad("go","GO!","");
      SFX.tick();
    },delay);
  }

  function react(){
    if(state==="wait"){
      // too soon
      clearTimeout(timer);
      state="idle";
      slots[round].className='slot early';
      slots[round].textContent="EARLY";
      setPad("early","TOO SOON!","tap to retry round");
      SFX.hit();
      statusEl.textContent="JUMPED EARLY — RETRYING";
      // retry same round on next input
      state="retry";
      return;
    }
    if(state==="retry"){
      slots[round].className='slot';
      slots[round].textContent="—";
      nextRound();
      return;
    }
    if(state==="go"){
      const ms=Math.round(performance.now()-goAt);
      times.push(ms);
      SFX.coin();
      slots[round].className='slot filled';
      slots[round].textContent=ms;
      if(best===0||ms<best){ best=ms; localStorage.setItem(KEY,best); bestEl.textContent=best+"ms"; newBest=true; }
      round++;
      state="gap";
      setPad("done",ms+" ms",round<ROUNDS?"tap for next":"finishing...");
      statusEl.textContent=round<ROUNDS?"NICE — TAP TO CONTINUE":"…";
      if(round<ROUNDS){
        // wait for next input to start next round
      } else {
        setTimeout(finish,400);
      }
      return;
    }
    if(state==="gap"){
      nextRound();
      return;
    }
  }

  function finish(){
    state="idle";
    const sum=times.reduce((a,b)=>a+b,0);
    const avg=times.length?Math.round(sum/times.length):0;
    avgEl.textContent=avg+"ms";
    setPad("idle","DONE!","avg "+avg+" ms");
    statusEl.textContent="AVERAGE "+avg+"ms — PRESS START";
    startBtn.textContent="START";
    if(times.length){ if(newBest) SFX.win(); else SFX.powerup(); }
  }

  pad.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(state==="idle") return; // must press start first
    react();
  });
  document.addEventListener('keydown',e=>{
    if(e.code==="Space"){
      e.preventDefault();
      if(state==="idle") return;
      react();
    }
  });
  startBtn.addEventListener('click',startSession);
})();
</script>
</body>
</html>
